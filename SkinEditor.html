<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <link href="https://fonts.cdnfonts.com/css/common-pixel" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/skinview3d@3.0.0-alpha.1/bundles/skinview3d.bundle.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;touch-action:none;image-rendering:pixelated}
        html,body{position:fixed;width:100%;height:100%;overflow:hidden;background:#1a1a1a;color:#fff;font-family:'Common Pixel',sans-serif}
        body{display:flex;flex-direction:column;padding-top:85px}
        .tabs-row{display:flex;padding:0 10px;gap:2px;height:30px;align-items:flex-end}
        .tab{height:26px;background:#252525;border:1px solid #000;border-bottom:none;padding:0 15px;display:flex;align-items:center;font-size:8px;color:#555;border-radius:4px 4px 0 0}
        .tab.active{background:#333;color:#fff;height:30px;position:relative;z-index:11}
        .tab.active::after{content:"";position:absolute;bottom:-2px;left:0;right:0;height:3px;background:#333;z-index:12}
        .toolbar{height:42px;background:#333;border:1px solid #000;border-left:none;border-right:none;display:flex;align-items:center;padding:0 10px;position:relative;z-index:100;gap:8px}
        .toolbar-left,.toolbar-right{display:flex;gap:6px;align-items:center}
        .toolbar-right{flex:1;justify-content:flex-end}
        .back-btn{position:relative;margin-left:15px;padding:0 12px;background:#3d3d3d;border:1px solid #111;height:30px;font-size:8px;display:flex;align-items:center}
        .back-btn::before{content:"";position:absolute;left:-15px;top:-1px;border:15px solid;border-color:transparent #111 transparent transparent}
        .back-btn::after{content:"";position:absolute;left:-13px;top:0;border:14px solid;border-color:transparent #3d3d3d transparent transparent}
        .btn-ui{height:30px;background:#3d3d3d;border:1px solid #111;display:flex;align-items:center;justify-content:center;padding:0 8px;font-size:7px;position:relative}
        .info-ui{height:30px;background:#2b2b2b;border:1px solid #111;display:flex;align-items:center;padding:0 8px;font-size:7px;color:#888}
        .dropdown{position:absolute;top:32px;left:-1px;width:100%;background:#3d3d3d;border:1px solid #111;display:none;flex-direction:column;z-index:200}
        .dropdown div{padding:10px;border-bottom:1px solid #111;font-size:7px;text-align:center}
        main{flex:1;display:flex;justify-content:center;padding-top:20px}
        .view-row{display:flex;height:300px;width:calc(100% - 40px);border:2px solid #000}
        .view-w{flex:1;background:#1a1a1a;position:relative;overflow:hidden;background-image:linear-gradient(45deg,#222 25%,transparent 25%),linear-gradient(-45deg,#222 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#222 75%),linear-gradient(-45deg,transparent 75%,#222 75%);background-size:20px 20px}
        #skin_container{width:100%;height:100%}
        .zoom-panel{width:20px;background:#2b2b2b;border-left:2px solid #000;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:4px 0;overflow:hidden}
        .zoom-ticks{flex:1;width:100%;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center}
        .zoom-tick{width:8px;height:1px;background:#444;margin:8px 0;transition:transform 0.1s}
        .zoom-center{position:absolute;width:14px;height:2px;background:#fff;z-index:5;top:50%;margin-top:-1px}
        .btn-icon{width:14px;height:14px;filter:brightness(0) invert(1)}
        .robot-icon{width:18px;height:18px}
        .status-bar{height:25px;background:#2b2b2b;border-top:1px solid #111;display:flex;align-items:center;padding:0 12px;font-size:7px;color:#555;justify-content:space-between}
    </style>
</head>
<body>
    <div class="tabs-row">
        <div class="tab"><span>Workspace</span></div>
        <div class="tab active" onclick="renameF()"><span id="fN">skin.png</span></div>
    </div>
    <div class="toolbar">
        <div class="toolbar-left">
            <div class="back-btn">BACK</div>
            <div class="info-ui">POS: <b id="pT">0 0 0</b></div>
            <div class="btn-ui" onclick="tDD(event)"><span id="mN">STEVE</span>
                <div id="mDD" class="dropdown"><div onclick="setM('STEVE',0)">STEVE</div><div onclick="setM('ALEX',1)">ALEX</div></div>
            </div>
            <div class="btn-ui" onclick="toggleL()"><span style="color:#888">LAYERS: </span><span id="lSt" style="margin-left:4px">ON</span></div>
            <div class="btn-ui"><img src="https://cdn-icons-png.flaticon.com/512/8254/8254111.png" class="robot-icon"></div>
        </div>
        <div class="toolbar-right">
            <div class="btn-ui" onclick="saveS()"><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/save-icon-svg-download-png-14350349.png?f=webp&w=512" class="btn-icon"></div>
            <div class="btn-ui" onclick="expS()"><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/upload-icon-svg-download-png-14350373.png?f=webp&w=512" class="btn-icon"></div>
        </div>
    </div>
    <main><div class="view-row">
        <div class="view-w"><div id="skin_container"></div></div>
        <div class="zoom-panel">
            <div id="zU" style="font-size:6px;color:#888">0</div>
            <div class="zoom-ticks" id="zT">
                <div class="zoom-tick"></div><div class="zoom-tick"></div><div class="zoom-tick"></div>
                <div class="zoom-center"></div>
                <div class="zoom-tick"></div><div class="zoom-tick"></div><div class="zoom-tick"></div>
            </div>
            <div id="zD" style="font-size:6px;color:#888">0</div>
        </div>
    </div></main>
    <div class="status-bar"><span>MODE: PREVIEW</span><span>RES: 64x64</span></div>
    <script>
        const tg=window.Telegram.WebApp;tg.expand();
        let sv=new skinview3d.SkinViewer({width:300,height:300,skin:"https://minotar.net/skin/MHF_Steve.png",model:"default",alpha:true});
        document.getElementById("skin_container").appendChild(sv.canvas);
        let ctrl=skinview3d.createOrbitControls(sv);sv.zoom=3.5;sv.animation=new skinview3d.WalkingAnimation();

        function up(){
            pT.innerText=`${Math.round(sv.camera.position.x)} ${Math.round(sv.camera.position.y)} ${Math.round(sv.camera.position.z)}`;
            let v=Math.abs(Math.round((sv.zoom-3.5)*10));zU.innerText=v;zD.innerText=v;
            let off=(sv.zoom%1)*15;
            document.querySelectorAll('.zoom-tick').forEach(t=>t.style.transform=`translateY(${off}px)`);
        }
        ctrl.addEventListener('change',up);up();
        function res(){const w=document.querySelector('.view-w');sv.width=w.clientWidth;sv.height=w.clientHeight;sv.camera.aspect=sv.width/sv.height;sv.camera.updateProjectionMatrix()}
        window.onresize=res;res();
        function renameF(){let n=prompt("NAME:",fN.innerText.split('.')[0]);if(n)fN.innerText=n.toLowerCase().slice(0,20)+".png"}
        function tDD(e){e.stopPropagation();mDD.style.display=mDD.style.display==='flex'?'none':'flex'}
        function setM(m,s){mN.innerText=m;sv.loadSkin(s?"https://minotar.net/skin/Alex":"https://minotar.net/skin/MHF_Steve.png",{model:s?"slim":"default"});tg.HapticFeedback?.impactOccurred('medium')}
        function toggleL(){let on=lSt.innerText==="ON";lSt.innerText=on?"OFF":"ON";lSt.style.color=on?"#888":"#fff";['head','body','rightArm','leftArm','rightLeg','leftLeg'].forEach(p=>sv.playerObject.skin[p].outerLayer.visible=!on)}
        function saveS(){tg.HapticFeedback?.notificationOccurred('success')}
        function expS(){const a=document.createElement('a');a.href=sv.canvas.toDataURL();a.download=fN.innerText;a.click()}
        window.onclick=()=>mDD.style.display='none';
    </script>
</body>
</html>
