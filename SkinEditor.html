<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <link href="https://fonts.cdnfonts.com/css/common-pixel" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/skinview3d@3.0.0-alpha.1/bundles/skinview3d.bundle.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;touch-action:none;image-rendering:pixelated}
        html,body{position:fixed;width:100%;height:100%;overflow:hidden;background:#1a1a1a;color:#fff;font-family:'Common Pixel',sans-serif}
        body{display:flex;flex-direction:column;padding-top:85px}
        .tabs-row{display:flex;padding:0 10px;gap:2px;height:30px;align-items:flex-end}
        .tab{height:26px;background:#252525;border:1px solid #000;border-bottom:none;padding:0 15px;display:flex;align-items:center;font-size:8px;color:#555;border-radius:4px 4px 0 0;cursor:pointer}
        .tab.active{background:#333;color:#fff;height:30px;position:relative;z-index:11}
        .tab.active::after{content:"";position:absolute;bottom:-2px;left:0;right:0;height:3px;background:#333;z-index:12}
        .toolbar{height:42px;background:#333;border:1px solid #000;border-left:none;border-right:none;display:flex;align-items:center;padding:0 10px;z-index:100;gap:8px}
        .toolbar-right{flex:1;justify-content:flex-end;display:flex;gap:6px}
        .btn-ui{height:30px;background:#3d3d3d;border:1px solid #111;box-shadow:inset 1px 1px 0 #555,inset -1px -1px 0 #222;display:flex;align-items:center;justify-content:center;padding:0 8px;font-size:7px;color:#fff;position:relative;cursor:pointer}
        .btn-ui.active{background:#1a1a1a;box-shadow:inset 1px 1px 2px #000;border-color:#444}
        .btn-icon{width:14px;height:14px;filter:brightness(0) invert(1)}
        main{flex:1;display:flex;flex-direction:column;align-items:center;padding-top:10px;position:relative}
        .view-w{width:calc(100% - 30px);height:50%;background:#1a1a1a;border:2px solid #000;position:relative;overflow:hidden}
        .view-w::before{content:"";position:absolute;width:100%;height:100%;background-image:linear-gradient(45deg,#222 25%,transparent 25%),linear-gradient(-45deg,#222 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#222 75%),linear-gradient(-45deg,transparent 75%,#222 75%);background-size:20px 20px}
        #skin_container{width:100%;height:100%;position:absolute}
        .edit-panel{background:#252525;border-top:2px solid #000;padding:12px;display:flex;flex-direction:column;gap:10px;z-index:110}
        .history-bar{display:flex;gap:5px;margin-bottom:2px}
        .h-slot{width:14px;height:14px;border:1px solid #000;background:#fff}
        .tools-row{display:flex;align-items:center;justify-content:space-between}
        .color-circle{width:32px;height:32px;border-radius:50%;border:2px solid #fff;background:#fff;box-shadow:0 0 5px #000}
        .pop-menu{position:absolute;bottom:100%;right:10px;background:#333;border:1px solid #000;display:none;flex-direction:column;min-width:100px;box-shadow:0 -5px 15px rgba(0,0,0,0.5)}
        .pop-item{padding:8px;font-size:7px;border-bottom:1px solid #222;display:flex;justify-content:space-between;align-items:center}
        .pop-item.off{color:#555}
        .status-bar{height:22px;background:#1a1a1a;display:flex;align-items:center;padding:0 10px;font-size:6px;color:#444;justify-content:space-between}
    </style>
</head>
<body>
    <div class="tabs-row">
        <div class="tab" onclick="location.href='Workspace.html'"><span>Workspace</span></div>
        <div class="tab active" onclick="renameF()"><div class="file-name-container"><span id="fN">skin.png</span> <img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/edit-icon-svg-download-png-14350273.png?f=webp&w=512" style="width:8px;filter:invert(1)"></div></div>
    </div>
    <div class="toolbar">
        <div class="btn-ui" onclick="location.href='index.html'">BACK</div>
        <div class="btn-ui" onclick="undo()"><img src="https://cdn-icons-png.flaticon.com/512/2268/2268531.png" class="btn-icon"></div>
        <div class="btn-ui" onclick="tDD(event)"><span id="mN">STEVE</span></div>
        <div class="toolbar-right">
            <div class="btn-ui" onclick="impS()"><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/download-icon-svg-download-png-14350272.png?f=webp&w=512" class="btn-icon"></div>
            <div class="btn-ui" onclick="expS()"><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/upload-icon-svg-download-png-14350373.png?f=webp&w=512" class="btn-icon"></div>
        </div>
    </div>
    <main><div class="view-w"><div id="skin_container"></div></div></main>
    <div class="edit-panel">
        <div class="history-bar"><div class="h-slot" style="background:#ff0000"></div><div class="h-slot" style="background:#00ff00"></div><div class="h-slot" style="background:#0000ff"></div><div class="h-slot" style="background:#000"></div></div>
        <div class="tools-row">
            <div class="color-circle" id="cP" onclick="cI.click()"></div>
            <input type="color" id="cI" style="display:none" onchange="uC(this.value)">
            <div style="display:flex;gap:4px">
                <div class="btn-ui active" id="t_b" onclick="sT('b')"><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/paint-brush-icon-svg-download-png-14350322.png?f=webp&w=512" class="btn-icon"></div>
                <div class="btn-ui" id="t_e" onclick="sT('e')"><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/eraser-icon-svg-download-png-14350275.png?f=webp&w=512" class="btn-icon"></div>
                <div class="btn-ui" id="t_f" onclick="sT('f')"><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/paint-bucket-icon-svg-download-png-14350323.png?f=webp&w=512" class="btn-icon"></div>
                <div class="btn-ui" id="t_p" onclick="sT('p')"><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/zoom-in-icon-svg-download-png-14350385.png?f=webp&w=512" class="btn-icon"></div>
            </div>
            <div class="btn-ui" onclick="tLY(event)"><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/layers-icon-svg-download-png-14350299.png?f=webp&w=512" class="btn-icon">
                <div id="lM" class="pop-menu">
                    <div class="pop-item" onclick="vP('head')">HEAD <span id="v_head">ON</span></div>
                    <div class="pop-item" onclick="vP('body')">BODY <span id="v_body">ON</span></div>
                    <div class="pop-item" onclick="vP('leftArm')">L ARM <span id="v_leftArm">ON</span></div>
                    <div class="pop-item" onclick="vP('rightArm')">R ARM <span id="v_rightArm">ON</span></div>
                    <div class="pop-item" onclick="vP('outer')">OVERLAY <span id="v_outer">ON</span></div>
                </div>
            </div>
        </div>
    </div>
    <div class="status-bar"><span>255 255 255</span><span id="pT">0 0 0</span><span>64x64</span></div>
    <div id="mDD" class="pop-menu" style="top:130px;left:50px;bottom:auto"><div onclick="setM('STEVE',false)">STEVE (4px)</div><div onclick="setM('ALEX',true)">ALEX (3px)</div></div>
    <input type="file" id="sIm" accept="image/png" style="display:none" onchange="hI(event)">
    <script>
        const tg=window.Telegram.WebApp;tg.expand();tg.disableVerticalSwipes();
        let sv=new skinview3d.SkinViewer({width:300,height:400,skin:"https://minotar.net/skin/MHF_Steve.png",model:"default",alpha:true});
        document.getElementById("skin_container").appendChild(sv.canvas);
        let ctrl=skinview3d.createOrbitControls(sv);sv.zoom=4;sv.animation=new skinview3d.WalkingAnimation();
        function res(){const w=document.querySelector('.view-w');sv.width=w.clientWidth;sv.height=w.clientHeight;sv.camera.aspect=w.clientWidth/w.clientHeight;sv.camera.updateProjectionMatrix()}
        window.addEventListener('resize',res);res();
        function uC(h){cP.style.background=h;tg.HapticFeedback?.impactOccurred('light')}
        function sT(t){['b','e','f','p'].forEach(x=>document.getElementById('t_'+x).classList.remove('active'));document.getElementById('t_'+t).classList.add('active');tg.HapticFeedback?.impactOccurred('light')}
        function tLY(e){e.stopPropagation();lM.style.display=lM.style.display==='flex'?'none':'flex'}
        function vP(p){
            tg.HapticFeedback?.impactOccurred('light');const el=document.getElementById('v_'+p);const isOn=el.innerText==='ON';el.innerText=isOn?'OFF':'ON';
            if(p==='outer'){const parts=['head','body','rightArm','leftArm','rightLeg','leftLeg'];parts.forEach(x=>sv.playerObject.skin[x].outerLayer.visible=!isOn)}
            else{sv.playerObject.skin[p].visible=!isOn}
        }
        function tDD(e){e.stopPropagation();mDD.style.display=mDD.style.display==='flex'?'none':'flex'}
        function setM(m,s){mN.innerText=m;sv.loadSkin(sv.skinUrl,{model:s?"slim":"default"});tg.HapticFeedback?.impactOccurred('medium')}
        function expS(){const a=document.createElement('a');a.href=sv.canvas.toDataURL();a.download=fN.innerText;a.click()}
        function impS(){sIm.click()}
        function hI(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{sv.loadSkin(e.target.result);fN.innerText=f.name.toLowerCase()};r.readAsDataURL(f)}
        function renameF(){let n=prompt("NAME:",fN.innerText);if(n)fN.innerText=n.toLowerCase()+".png"}
        window.onclick=()=>{mDD.style.display='none';lM.style.display='none'};
        ctrl.addEventListener('change',()=>{const c=sv.camera.position;pT.innerText=`${Math.round(c.x)} ${Math.round(c.y)} ${Math.round(c.z)}`});
    </script>
</body>
</html>
