<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>APixel - Skin Editor</title>
    <link href="https://fonts.cdnfonts.com/css/common-pixel" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/skinview3d@3.0.0-alpha.1/bundles/skinview3d.bundle.js"></script>
    <style>
        * { 
            box-sizing: border-box; margin: 0; padding: 0; 
            -webkit-user-select: none; user-select: none; 
            -webkit-touch-callout: none; image-rendering: pixelated; 
        }

        html, body { 
            position: fixed; width: 100%; height: 100%; 
            overflow: hidden; background-color: #1a1a1a; 
            color: #fff; font-family: 'Common Pixel', sans-serif; 
        }

        body { 
            display: flex; flex-direction: column; 
            padding-top: var(--tg-safe-area-inset-top, 20px); 
        }

        /* Вкладки */
        .tabs-row {
            display: flex;
            padding: 0 10px;
            gap: 2px;
            height: 30px;
            align-items: flex-end;
        }

        .tab {
            height: 26px;
            background: #252525;
            border: 1px solid #000;
            border-bottom: none;
            padding: 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 8px;
            color: #555; /* Серый текст для неактивной вкладки */
            border-radius: 4px 4px 0 0;
        }

        .tab.active {
            background: #3d3d3d;
            color: #fff; /* Белый текст для активной вкладки */
            height: 30px;
            z-index: 2;
        }

        .tab-icon, .btn-icon { 
            width: 12px; height: 12px; 
            filter: brightness(0) invert(1); /* Делаем иконки белыми */
            object-fit: contain;
        }

        /* Панель инструментов */
        .toolbar {
            height: 42px;
            background: #333;
            border-top: 1px solid #444;
            border-bottom: 2px solid #000;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 6px;
        }

        .tool-btn {
            height: 30px;
            background: #3d3d3d;
            border: 1px solid #111;
            box-shadow: inset 1px 1px 0 #555, inset -1px -1px 0 #222;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 10px;
            font-size: 8px;
            cursor: pointer;
            color: #fff; /* Белый текст на кнопках */
        }

        .tool-btn:active { 
            box-shadow: inset -1px -1px 0 #555, inset 1px 1px 0 #222; 
            transform: translateY(1px);
        }

        .divider { width: 1px; height: 22px; background: #1a1a1a; margin: 0 4px; border-right: 1px solid #444; }

        /* Рабочая область */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #222;
            padding: 20px;
        }

        .viewport-window {
            width: 100%;
            max-width: 360px;
            height: 50%; 
            background: #1a1a1a;
            border: 2px solid #000;
            box-shadow: inset 2px 2px 0 #333;
            position: relative;
            overflow: hidden;
        }

        .viewport-window::before {
            content: "";
            position: absolute;
            width: 100%; height: 100%;
            background-image: linear-gradient(45deg, #1d1d1d 25%, transparent 25%), 
                              linear-gradient(-45deg, #1d1d1d 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #1d1d1d 75%), 
                              linear-gradient(-45deg, transparent 75%, #1d1d1d 75%);
            background-size: 20px 20px;
            opacity: 0.5;
        }

        #skin_container { width: 100%; height: 100%; position: relative; z-index: 1; }

        .status-bar {
            height: 25px;
            background: #2b2b2b;
            border-top: 1px solid #111;
            display: flex;
            align-items: center;
            padding: 0 12px;
            font-size: 7px;
            color: #555;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <div class="tabs-row">
        <div class="tab"><span>Workspace</span></div>
        <div class="tab active">
            <img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/edit-icon-svg-download-png-14350273.png?f=webp&w=512" class="tab-icon">
            <span>skin.png</span>
        </div>
    </div>

    <div class="toolbar">
        <div class="tool-btn" onclick="goBack()">BACK</div>
        <div class="divider"></div>
        
        <div class="tool-btn">
            <img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/download-icon-svg-download-png-14350272.png?f=webp&w=512" class="btn-icon">
            <span>IMPORT</span>
        </div>

        <div class="tool-btn">
            <img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/upload-icon-svg-download-png-14350373.png?f=webp&w=512" class="btn-icon">
            <span>EXPORT</span>
        </div>

        <div class="tool-btn">
            <img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/save-icon-svg-download-png-14350349.png?f=webp&w=512" class="btn-icon">
            <span>SAVE</span>
        </div>
    </div>

    <main>
        <div class="viewport-window">
            <div id="skin_container"></div>
        </div>
    </main>

    <div class="status-bar">
        <span>MODE: PREVIEW</span>
        <span>RES: 64x64</span>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let skinViewer = new skinview3d.SkinViewer({
            width: 300,
            height: 300, 
            skin: "https://minotar.net/skin/MHF_Steve.png",
            alpha: true
        });
        
        document.getElementById("skin_container").appendChild(skinViewer.canvas);
        let control = skinview3d.createOrbitControls(skinViewer);
        skinViewer.zoom = 0.5; 
        skinViewer.animation = new skinview3d.WalkingAnimation();

        function resize() {
            const win = document.querySelector('.viewport-window');
            skinViewer.width = win.clientWidth;
            skinViewer.height = win.clientHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function goBack() {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            window.location.replace('index.html');
        }

        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
