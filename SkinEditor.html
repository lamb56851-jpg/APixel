<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<link href="https://fonts.cdnfonts.com/css/common-pixel" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/skinview3d@3.0.0-alpha.1/bundles/skinview3d.bundle.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;touch-action:none;image-rendering:pixelated}
html,body{position:fixed;width:100%;height:100%;overflow:hidden;background:#1a1a1a;color:#fff;font-family:'Common Pixel',sans-serif}
body{display:flex;flex-direction:column;padding-top:85px}
.tabs-row{display:flex;padding:0 10px;gap:2px;height:30px;align-items:flex-end}
.tab{height:26px;background:#252525;border:1px solid #000;border-bottom:none;padding:0 15px;display:flex;align-items:center;font-size:8px;color:#555;border-radius:4px 4px 0 0;cursor:pointer}
.tab.active{background:#333;color:#fff;height:30px;position:relative;z-index:11}
.tab.active::after{content:"";position:absolute;bottom:-2px;left:0;right:0;height:3px;background:#333;z-index:12}
.file-name-container{display:flex;align-items:center;gap:6px}
.pencil-icon{width:10px;height:10px;filter:brightness(0) invert(1);opacity:0.7}
.toolbar{height:42px;background:#333;border:1px solid #000;border-left:none;border-right:none;display:flex;align-items:center;padding:0 10px;position:relative;z-index:100;gap:8px}
.toolbar-left,.toolbar-right{display:flex;align-items:center;gap:6px}
.toolbar-right{flex:1;justify-content:flex-end}
.back-btn{position:relative;margin-left:15px;padding:0 12px;background:#3d3d3d;border:1px solid #111;border-left:none;height:30px;color:#fff;font-size:8px;display:flex;align-items:center;box-shadow:inset 0 1px 0 #555,inset 0 -1px 0 #222}
.back-btn::before{content:"";position:absolute;left:-15px;top:-1px;border-style:solid;border-width:15px 15px 15px 0;border-color:transparent #111 transparent transparent}
.back-btn::after{content:"";position:absolute;left:-13px;top:0;border-style:solid;border-width:14px 14px 14px 0;border-color:transparent #3d3d3d transparent transparent}
.btn-ui{height:30px;background:#3d3d3d;border:1px solid #111;box-shadow:inset 1px 1px 0 #555,inset -1px -1px 0 #222;display:flex;align-items:center;justify-content:center;padding:0 8px;font-size:7px;color:#fff;position:relative;cursor:pointer;min-width:30px}
.btn-ui.active{background:#222;box-shadow:inset 1px 1px 2px #000;border-color:#555}
.info-ui{height:30px;background:#2b2b2b;border:1px solid #111;display:flex;align-items:center;padding:0 8px;font-size:7px;color:#888;letter-spacing:1px}
.chevron{font-size:10px;transform:rotate(90deg);margin-left:6px;color:#fff}
.dropdown{position:absolute;top:32px;left:-1px;width:100%;background:#3d3d3d;border:1px solid #111;display:none;flex-direction:column;z-index:200;box-shadow:inset 1px 1px 0 #555}
.dropdown div{padding:10px;border-bottom:1px solid #111;color:#fff;text-align:center;font-size:7px}
.btn-icon{width:14px;height:14px;filter:brightness(0) invert(1)}
main{flex:1;display:flex;flex-direction:column;align-items:center;padding-top:20px;position:relative}
.view-w{width:calc(100% - 40px);height:50%;background:#1a1a1a;border:2px solid #000;box-shadow:inset 2px 2px 0 #222;position:relative;overflow:hidden}
.view-w::before{content:"";position:absolute;top:0;left:0;width:100%;height:100%;background:conic-gradient(#2a2a2a 90deg,transparent 90deg 180deg,#2a2a2a 180deg 270deg,transparent 270deg);background-size:20px 20px}
#skin_container{width:100%;height:100%;position:absolute;display:flex;justify-content:center;align-items:center}
.edit-panel{width:100%;background:#333;border-top:1px solid #000;padding:10px;display:flex;flex-direction:column;gap:8px}
.tools-row{display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap}
.color-selector{display:flex;align-items:center;gap:8px;background:#2b2b2b;padding:4px 8px;border:1px solid #111;height:30px;cursor:pointer;flex:1;min-width:100px}
.color-preview{width:16px;height:16px;border:1px solid #000;background:#fff}
.rgb-text{font-size:7px;color:#fff;letter-spacing:1px}
.tool-group{display:flex;gap:4px;flex-wrap:wrap;flex:2;justify-content:center}
.status-bar{height:25px;background:#2b2b2b;border-top:1px solid #111;display:flex;align-items:center;padding:0 12px;font-size:7px;color:#555;justify-content:space-between}
.tool-txt{font-size:12px;line-height:1}
</style>
</head>
<body>
<div class="tabs-row">
<div class="tab" onclick="location.href='Workspace.html'"><span>Workspace</span></div>
<div class="tab active" onclick="renameF()"><div class="file-name-container"><span id="fN">skin.png</span><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/edit-icon-svg-download-png-14350273.png?f=webp&w=512" class="pencil-icon"></div></div>
</div>
<div class="toolbar">
<div class="toolbar-left">
<div class="back-btn" onclick="location.href='index.html'">BACK</div>
<div class="info-ui">POS:<b id="pT">0 0 0</b></div>
<div class="btn-ui" onclick="tDD(event)"><span id="mN">STEVE</span><span class="chevron">></span>
<div id="mDD" class="dropdown"><div onclick="setM('STEVE',false)">STEVE</div><div onclick="setM('ALEX',true)">ALEX</div></div>
</div>
<div class="btn-ui" onclick="toggleL()"><span style="color:#888">LAYERS: </span><span id="lSt" style="margin-left:4px">ON</span></div>
</div>
<div class="toolbar-right">
<div class="btn-ui" onclick="un()"><span class="tool-txt">↩</span></div>
<div class="btn-ui" onclick="re()"><span class="tool-txt">↪</span></div>
<div class="btn-ui" onclick="impS()"><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/download-icon-svg-download-png-14350272.png?f=webp&w=512" class="btn-icon"></div>
<div class="btn-ui" onclick="expS()"><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/upload-icon-svg-download-png-14350373.png?f=webp&w=512" class="btn-icon"></div>
<input type="file" id="skinImport" accept="image/png" style="display:none" onchange="hImp(event)">
</div>
</div>
<main><div class="view-w"><div id="skin_container"></div></div></main>
<div class="edit-panel">
<div class="tools-row">
<div class="color-selector" onclick="pickC()"><div id="cPrev" class="color-preview"></div><span id="rTxt" class="rgb-text">255 255 255</span><input type="color" id="cInp" style="display:none" value="#ffffff" onchange="updC(this.value)"></div>
<div class="btn-ui" onclick="rotT()"><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/layers-icon-svg-download-png-14350299.png?f=webp&w=512" class="btn-icon"></div>
</div>
<div class="tools-row">
<div class="tool-group">
<div class="btn-ui active" id="t_brush" onclick="sT('brush')"><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/paint-brush-icon-svg-download-png-14350322.png?f=webp&w=512" class="btn-icon"></div>
<div class="btn-ui" id="t_eraser" onclick="sT('eraser')"><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/eraser-icon-svg-download-png-14350275.png?f=webp&w=512" class="btn-icon"></div>
<div class="btn-ui" id="t_bucket" onclick="sT('bucket')"><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/paint-bucket-icon-svg-download-png-14350323.png?f=webp&w=512" class="btn-icon"></div>
<div class="btn-ui" id="t_picker" onclick="sT('picker')"><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/zoom-in-icon-svg-download-png-14350385.png?f=webp&w=512" class="btn-icon"></div>
<div class="btn-ui" id="t_light" onclick="sT('light')"><span class="tool-txt">☀</span></div>
<div class="btn-ui" id="t_dark" onclick="sT('dark')"><span class="tool-txt">☾</span></div>
<div class="btn-ui" id="t_noise" onclick="sT('noise')"><span class="tool-txt">░</span></div>
</div>
</div>
</div>
<div class="status-bar"><span id="mSt">MODE: EDITING</span><span id="resInfo">RES: 64x64</span></div>
<script>
const tg=window.Telegram.WebApp;tg.expand();tg.disableVerticalSwipes();
let cT='brush',cC='#ffffff',isR=true,hst=[],hP=-1,isD=false;
const pC=document.createElement('canvas');pC.width=64;pC.height=64;
const ctx=pC.getContext('2d',{willReadFrequently:true});
let sv=new skinview3d.SkinViewer({width:300,height:300,alpha:true});
document.getElementById("skin_container").appendChild(sv.canvas);
let ctrl=skinview3d.createOrbitControls(sv);sv.zoom=3.5;sv.camera.position.set(0,10,30);
const img=new Image();img.crossOrigin="anonymous";img.src="https://minotar.net/skin/MHF_Steve.png";
img.onload=()=>{ctx.clearRect(0,0,64,64);ctx.drawImage(img,0,0);svS();uS();};
const ray=new THREE.Raycaster(),mouse=new THREE.Vector2();
function svS(){
if(hP<hst.length-1)hst=hst.slice(0,hP+1);
hst.push(ctx.getImageData(0,0,64,64));
if(hst.length>20)hst.shift();else hP++;
}
function un(){if(hP>0){hP--;ctx.putImageData(hst[hP],0,0);uS();tg.HapticFeedback?.impactOccurred('light');}}
function re(){if(hP<hst.length-1){hP++;ctx.putImageData(hst[hP],0,0);uS();tg.HapticFeedback?.impactOccurred('light');}}
function uS(){sv.loadSkin(pC.toDataURL());}
function hPnt(e){
if(isR&&cT!=='picker')return;
const r=sv.canvas.getBoundingClientRect(),x=((e.clientX-r.left)/r.width)*2-1,y=-((e.clientY-r.top)/r.height)*2+1;
mouse.set(x,y);ray.setFromCamera(mouse,sv.camera);
const int=ray.intersectObjects(sv.playerObject.children,true);
if(int.length>0&&int[0].uv){
let u=Math.floor(int[0].uv.x*64),v=Math.floor((1-int[0].uv.y)*64);
aT(u,v);
}
}
sv.canvas.addEventListener('pointerdown',e=>{if(!isR){isD=true;svS();sv.canvas.setPointerCapture(e.pointerId);hPnt(e);sv.canvas.addEventListener('pointermove',hPnt);}});
window.addEventListener('pointerup',()=>{if(isD){isD=false;sv.canvas.removeEventListener('pointermove',hPnt);svS();}});
function aT(x,y){
if(cT==='brush'){ctx.fillStyle=cC;ctx.fillRect(x,y,1,1);}
else if(cT==='eraser')ctx.clearRect(x,y,1,1);
else if(cT==='picker'){let d=ctx.getImageData(x,y,1,1).data;updC("#"+((1<<24)+(d[0]<<16)+(d[1]<<8)+d[2]).toString(16).slice(1));sT('brush');return;}
else if(cT==='bucket')fF(x,y,cC);
else if(cT==='light'||cT==='dark'){
let d=ctx.getImageData(x,y,1,1).data;if(d[3]===0)return;
let m=cT==='light'?15:-15,r=Math.max(0,Math.min(255,d[0]+m)),g=Math.max(0,Math.min(255,d[1]+m)),b=Math.max(0,Math.min(255,d[2]+m));
ctx.fillStyle=`rgba(${r},${g},${b},${d[3]/255})`;ctx.clearRect(x,y,1,1);ctx.fillRect(x,y,1,1);
}
else if(cT==='noise'){
let d=ctx.getImageData(x,y,1,1).data;if(d[3]===0)return;
let n=(Math.random()-0.5)*30,r=Math.max(0,Math.min(255,d[0]+n)),g=Math.max(0,Math.min(255,d[1]+n)),b=Math.max(0,Math.min(255,d[2]+n));
ctx.fillStyle=`rgba(${r},${g},${b},${d[3]/255})`;ctx.clearRect(x,y,1,1);ctx.fillRect(x,y,1,1);
}
uS();
}
function fF(sX,sY,fH){
let t=ctx.getImageData(sX,sY,1,1).data,fR=h2r(fH);
if(t[0]===fR.r&&t[1]===fR.g&&t[2]===fR.b&&t[3]===255)return;
let id=ctx.getImageData(0,0,64,64),p=id.data,q=[[sX,sY]];
while(q.length>0){
let[x,y]=q.pop(),o=(y*64+x)*4;
if(p[o]===t[0]&&p[o+1]===t[1]&&p[o+2]===t[2]&&p[o+3]===t[3]){
p[o]=fR.r;p[o+1]=fR.g;p[o+2]=fR.b;p[o+3]=255;
if(x>0)q.push([x-1,y]);if(x<63)q.push([x+1,y]);if(y>0)q.push([x,y-1]);if(y<63)q.push([x,y+1]);
}}ctx.putImageData(id,0,0);
}
function h2r(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}
function rotT(){isR=!isR;ctrl.enabled=isR;document.getElementById('mSt').innerText=isR?"MODE: VIEW":"MODE: PAINT";tg.HapticFeedback?.impactOccurred('medium');}
function pickC(){document.getElementById('cInp').click();}
function updC(h){cC=h;document.getElementById('cPrev').style.background=h;let r=h2r(h);document.getElementById('rTxt').innerText=`${r.r} ${r.g} ${r.b}`;document.getElementById('cInp').value=h;tg.HapticFeedback?.impactOccurred('light');}
function sT(t){cT=t;document.querySelectorAll('.tool-group .btn-ui').forEach(b=>b.classList.remove('active'));document.getElementById(`t_${t}`).classList.add('active');if(t!=='picker'){isR=false;ctrl.enabled=false;document.getElementById('mSt').innerText="MODE: PAINT";}tg.HapticFeedback?.impactOccurred('light');}
function setM(m,s){document.getElementById('mN').innerText=m;let i=new Image();i.crossOrigin="anonymous";i.src=s?"https://minotar.net/skin/Alex":"https://minotar.net/skin/MHF_Steve.png";i.onload=()=>{ctx.clearRect(0,0,64,64);ctx.drawImage(i,0,0);sv.loadSkin(pC.toDataURL(),{model:s?"slim":"default"});svS();};tg.HapticFeedback?.impactOccurred('medium');}
function toggleL(){let l=document.getElementById('lSt'),on=l.innerText==="ON";l.innerText=on?"OFF":"ON";l.style.color=on?"#888":"#fff";['head','body','rightArm','leftArm','rightLeg','leftLeg'].forEach(p=>sv.playerObject.skin[p].outerLayer.visible=!on);tg.HapticFeedback?.impactOccurred('light');}
function renameF(){let n=prompt("ENTER FILE NAME:",document.getElementById('fN').innerText.replace('.png',''));if(n)document.getElementById('fN').innerText=n.substring(0,20).toLowerCase()+".png";}
function expS(){let a=document.createElement('a');a.href=pC.toDataURL();a.download=document.getElementById('fN').innerText;a.click();}
function impS(){document.getElementById('skinImport').click();}
function hImp(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=(e)=>{let i=new Image();i.onload=()=>{ctx.clearRect(0,0,64,64);ctx.drawImage(i,0,0);uS();svS();};i.src=e.target.result;};r.readAsDataURL(f);}
function tDD(e){e.stopPropagation();let m=document.getElementById('mDD');m.style.display=m.style.display==='flex'?'none':'flex';}
window.onclick=()=>document.getElementById('mDD').style.display='none';
ctrl.addEventListener('change',()=>{let c=sv.camera.position;document.getElementById('pT').innerText=`${Math.round(c.x)} ${Math.round(c.y)} ${Math.round(c.z)}`;});
function rs(){let w=document.querySelector('.view-w');sv.width=w.clientWidth;sv.height=w.clientHeight;sv.camera.aspect=w.clientWidth/w.clientHeight;sv.camera.updateProjectionMatrix();}
window.addEventListener('resize',rs);rs();
sv.animations.add(skinview3d.IdleAnimation);
</script>
</body>
</html>
