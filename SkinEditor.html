<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <link href="https://fonts.cdnfonts.com/css/common-pixel" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/skinview3d@3.0.0-alpha.1/bundles/skinview3d.bundle.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;touch-action:none;image-rendering:pixelated}
        html,body{position:fixed;width:100%;height:100%;overflow:hidden;background:#1a1a1a;color:#fff;font-family:'Common Pixel',sans-serif}
        body{display:flex;flex-direction:column;padding-top:85px}
        .tabs-row{display:flex;padding:0 10px;gap:2px;height:30px;align-items:flex-end}
        .tab{height:26px;background:#252525;border:1px solid #000;border-bottom:none;padding:0 15px;display:flex;align-items:center;font-size:8px;color:#555;border-radius:4px 4px 0 0;cursor:pointer}
        .tab.active{background:#333;color:#fff;height:30px;position:relative;z-index:11}
        .tab.active::after{content:"";position:absolute;bottom:-2px;left:0;right:0;height:3px;background:#333;z-index:12}
        .toolbar{height:42px;background:#333;border-bottom:1px solid #000;display:flex;align-items:center;padding:0 10px;z-index:100;gap:8px}
        .btn-ui{height:38px;min-width:38px;background:#3d3d3d;border:1px solid #111;box-shadow:inset 1px 1px 0 #555,inset -1px -1px 0 #222;display:flex;align-items:center;justify-content:center;padding:0 10px;font-size:8px;color:#fff;cursor:pointer}
        .btn-ui.active{background:#111;box-shadow:inset 1px 1px 3px #000;border-color:#444}
        .back-btn{position:relative;margin-left:15px;padding:0 10px;background:#3d3d3d;border:1px solid #111;border-left:none;height:30px;color:#fff;font-size:8px;display:flex;align-items:center}
        .back-btn::before{content:"";position:absolute;left:-15px;top:-1px;border-style:solid;border-width:15px 15px 15px 0;border-color:transparent #111 transparent transparent}
        .back-btn::after{content:"";position:absolute;left:-13px;top:0;border-style:solid;border-width:14px 14px 14px 0;border-color:transparent #3d3d3d transparent transparent}
        .info-ui{height:30px;background:#2b2b2b;border:1px solid #111;display:flex;align-items:center;padding:0 8px;font-size:7px;color:#888}
        .btn-icon{width:20px;height:20px;filter:brightness(0) invert(1)}
        main{flex:1;display:flex;justify-content:center;align-items:center;background:#121212;overflow:hidden}
        .view-w{width:90%;aspect-ratio:1/1;max-height:80%;background:#1a1a1a;border:3px solid #000;position:relative}
        .view-w::before{content:"";position:absolute;inset:0;background-image:linear-gradient(45deg,#222 25%,transparent 25%),linear-gradient(-45deg,#222 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#222 75%),linear-gradient(-45deg,transparent 75%,#222 75%);background-size:20px 20px}
        #skin_container{width:100%;height:100%;position:absolute}
        .edit-panel{background:rgba(45,45,45,0.95);backdrop-filter:blur(10px);border-top:2px solid #000;padding:15px 10px;display:flex;flex-direction:column;gap:15px;z-index:150}
        .context-row{display:flex;justify-content:space-between;align-items:center}
        .sl-g{display:flex;align-items:center;gap:8px;font-size:8px;color:#eee}
        .sl{width:70px;height:6px;-webkit-appearance:none;background:#000;border-radius:3px}
        .sl::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:#fff;border-radius:50%}
        .tools-row{display:flex;justify-content:space-between;align-items:center;gap:10px}
        .color-selector{display:flex;align-items:center;gap:10px;background:#1a1a1a;padding:5px 10px;border:1px solid #000;height:40px}
        .color-preview{width:22px;height:22px;border:1px solid #000;background:#fff}
        .r-col{width:16px;height:16px;border:1px solid #000}
        .dropdown,.layer-menu{position:absolute;bottom:100%;background:#3d3d3d;border:1px solid #000;display:none;flex-direction:column;min-width:120px;box-shadow:0 -5px 15px rgba(0,0,0,0.5)}
        .dropdown div,.layer-item{padding:12px;border-bottom:1px solid #222;font-size:8px;display:flex;justify-content:space-between;cursor:pointer}
        .status-bar{height:25px;background:#1a1a1a;border-top:1px solid #000;display:flex;align-items:center;padding:0 12px;font-size:7px;color:#555;justify-content:space-between}
    </style>
</head>
<body>
    <div class="tabs-row"><div class="tab" onclick="location.href='Workspace.html'"><span>Workspace</span></div><div class="tab active" onclick="renameF()"><div class="file-name-container"><span id="fN">skin.png</span><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/edit-icon-svg-download-png-14350273.png?f=webp&w=512" class="pencil-icon"></div></div></div>
    <div class="toolbar">
        <div class="back-btn" onclick="location.href='index.html'">BACK</div>
        <div class="info-ui">POS:<b id="pT">0 0 0</b></div>
        <div class="btn-ui" style="position:relative" onclick="tDD(event,'mDD')"><span id="mN">STEVE</span><div id="mDD" class="dropdown" style="bottom:auto;top:100%"><div onclick="setM('STEVE',false)">STEVE</div><div onclick="setM('ALEX',true)">ALEX</div></div></div>
        <div class="btn-ui" onclick="toggleL()"><span id="lSt" style="color:#fff">OUTER ON</span></div>
        <div class="btn-ui" style="margin-left:auto"><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/save-icon-svg-download-png-14350349.png?f=webp&w=512" class="btn-icon" onclick="saveS()"></div>
        <div class="btn-ui"><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/upload-icon-svg-download-png-14350373.png?f=webp&w=512" class="btn-icon" onclick="expS()"></div>
    </div>
    <main><div class="view-w"><div id="skin_container"></div></div></main>
    <div class="edit-panel">
        <div class="context-row">
            <div style="display:flex;gap:15px"><div class="sl-g">SIZE<input type="range" min="1" max="10" value="1" class="sl"></div><div class="sl-g">OPC<input type="range" min="0" max="100" value="100" class="sl"></div></div>
            <div style="display:flex;gap:5px"><div class="btn-ui">↶</div><div class="btn-ui">↷</div></div>
        </div>
        <div class="tools-row">
            <div class="color-selector" onclick="document.getElementById('cI').click()">
                <div id="cP" class="color-preview"></div>
                <div style="display:flex;gap:3px" id="rC"></div>
                <input type="color" id="cI" style="display:none" onchange="uC(this.value)">
            </div>
            <div style="display:flex;gap:5px">
                <div class="btn-ui active" id="t_brush" onclick="sT('brush')"><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/paint-brush-icon-svg-download-png-14350322.png?f=webp&w=512" class="btn-icon"></div>
                <div class="btn-ui" id="t_eraser" onclick="sT('eraser')"><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/eraser-icon-svg-download-png-14350275.png?f=webp&w=512" class="btn-icon"></div>
                <div class="btn-ui" id="t_bucket" onclick="sT('bucket')"><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/paint-bucket-icon-svg-download-png-14350323.png?f=webp&w=512" class="btn-icon"></div>
                <div class="btn-ui" style="position:relative" onclick="tDD(event,'lM')">
                    <img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/layers-icon-svg-download-png-14350299.png?f=webp&w=512" class="btn-icon">
                    <div id="lM" class="layer-menu"></div>
                </div>
            </div>
        </div>
    </div>
    <div class="status-bar"><span>MODE: EDITING</span><span id="resT">64x64</span></div>
    <script>
        const tg=window.Telegram.WebApp;tg.expand();tg.disableVerticalSwipes();
        let sv=new skinview3d.SkinViewer({width:300,height:300,skin:"https://minotar.net/skin/MHF_Steve.png",model:"default",alpha:true});
        document.getElementById("skin_container").appendChild(sv.canvas);
        let ctrl=skinview3d.createOrbitControls(sv);sv.zoom=4;sv.camera.position.set(0,10,30);
        function upP(){const c=sv.camera.position;pT.innerText=`${Math.round(c.x)} ${Math.round(c.y)} ${Math.round(c.z)}`}
        ctrl.addEventListener('change',upP);upP();
        function res(){const w=document.querySelector('.view-w');sv.width=w.clientWidth;sv.height=w.clientHeight;sv.camera.aspect=1;sv.camera.updateProjectionMatrix()}
        window.addEventListener('resize',res);res();
        let hist=['#ff0000','#00ff00','#0000ff'];
        function rDR(){rC.innerHTML=hist.map(c=>`<div class="r-col" style="background:${c}" onclick="uC('${c}',true)"></div>`).join('')} rDR();
        function uC(h,f){cP.style.background=h;if(!hist.includes(h)){hist.unshift(h);hist.pop();rDR()}if(f)event?.stopPropagation();tg.HapticFeedback?.impactOccurred('light')}
        function sT(t){['brush','eraser','bucket'].forEach(x=>document.getElementById(`t_${x}`).classList.remove('active'));document.getElementById(`t_${t}`).classList.add('active');tg.HapticFeedback?.impactOccurred('light')}
        const pts={head:'HEAD',body:'BODY',rightArm:'R-ARM',leftArm:'L-ARM',rightLeg:'R-LEG',leftLeg:'L-LEG'};
        let lMH='';for(let p in pts)lMH+=`<div class="layer-item" onclick="tP('${p}',this,event)"><span>${pts[p]}</span><b style="color:#fff">ON</b></div>`;document.getElementById('lM').innerHTML=lMH;
        function tP(p,el,e){e.stopPropagation();let o=sv.playerObject.skin[p];o.visible=!o.visible;el.querySelector('b').innerText=o.visible?'ON':'OFF';el.querySelector('b').style.color=o.visible?'#fff':'#888';tg.HapticFeedback?.impactOccurred('light')}
        function tDD(e,id){e.stopPropagation();let m=document.getElementById(id);let v=m.style.display==='flex';document.querySelectorAll('.dropdown,.layer-menu').forEach(d=>d.style.display='none');m.style.display=v?'none':'flex';tg.HapticFeedback?.impactOccurred('light')}
        function toggleL(){const on=lSt.innerText.includes("ON");lSt.innerText=on?"OUTER OFF":"OUTER ON";lSt.style.color=on?"#888":"#fff";Object.keys(pts).forEach(p=>sv.playerObject.skin[p].outerLayer.visible=!on);tg.HapticFeedback?.impactOccurred('light')}
        function setM(m,s){mN.innerText=m;sv.loadSkin(s?"https://minotar.net/skin/Alex":"https://minotar.net/skin/MHF_Steve.png",{model:s?"slim":"default"});tg.HapticFeedback?.impactOccurred('medium')}
        function renameF(){let n=prompt("FILE NAME:",fN.innerText.replace('.png',''));if(n)fN.innerText=n.toLowerCase()+".png"}
        function saveS(){tg.HapticFeedback?.notificationOccurred('success')}
        function expS(){const a=document.createElement('a');a.href=sv.canvas.toDataURL();a.download=fN.innerText;a.click()}
        window.onclick=()=>document.querySelectorAll('.dropdown,.layer-menu').forEach(d=>d.style.display='none');
    </script>
</body>
</html>
