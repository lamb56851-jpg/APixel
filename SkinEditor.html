<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>APixel - Skin Editor</title>
    <link href="https://fonts.cdnfonts.com/css/common-pixel" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/skinview3d@3.0.0-alpha.1/bundles/skinview3d.bundle.js"></script>
    <style>
        * { 
            box-sizing: border-box; margin: 0; padding: 0; 
            -webkit-user-select: none; user-select: none; 
            -webkit-touch-callout: none; image-rendering: pixelated; 
        }

        html, body { 
            position: fixed; width: 100%; height: 100%; 
            overflow: hidden; background-color: #1a1a1a; 
            color: #fff; font-family: 'Common Pixel', sans-serif; 
        }

        body { 
            display: flex; flex-direction: column; 
            padding-top: 85px; 
        }

        /* Вкладки */
        .tabs-row {
            display: flex;
            padding: 0 10px;
            gap: 2px;
            height: 30px;
            align-items: flex-end;
        }

        .tab {
            height: 26px;
            background: #252525;
            border: 1px solid #000;
            border-bottom: none;
            padding: 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 8px;
            color: #555;
            border-radius: 4px 4px 0 0;
        }

        .tab.active {
            background: #333; 
            color: #fff;
            height: 30px;
            border: 1px solid #000;
            border-bottom: none;
            position: relative;
            z-index: 11;
        }

        .tab.active::after {
            content: "";
            position: absolute;
            bottom: -2px; left: 0; right: 0;
            height: 3px; background: #333;
            z-index: 12;
        }

        .tab-icon, .btn-icon { 
            width: 12px; height: 12px; 
            filter: brightness(0) invert(1); 
            object-fit: contain;
        }

        /* Панель инструментов (Toolbar) */
        .toolbar {
            height: 42px;
            background: #333;
            border-top: 1px solid #000;
            border-bottom: 2px solid #000;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 6px;
            position: relative;
            z-index: 10;
        }

        /* Левая часть тулбара (Цвет и Позиция) */
        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1; /* Занимает всё доступное место слева */
        }

        /* Блок выбора цвета */
        .color-picker-block {
            display: flex;
            align-items: center;
            height: 30px;
            background: #2b2b2b; /* Немного светлее фона тулбара */
            border: 1px solid #111;
            padding-right: 6px;
        }

        .selected-color-preview {
            width: 30px;
            height: 28px;
            background: #fff; /* Выбранный цвет по умолчанию */
            border-right: 1px solid #111;
            cursor: pointer;
        }

        .color-scheme-text {
            font-size: 7px;
            color: #888;
            padding-left: 6px;
            letter-spacing: 1px;
        }

        /* Блок позиции */
        .position-block {
            display: flex;
            align-items: center;
            height: 30px;
            background: #2b2b2b;
            border: 1px solid #111;
            padding: 0 8px;
            font-size: 7px;
            color: #888;
            letter-spacing: 1px;
        }

        /* Правая часть тулбара (Кнопки действий) */
        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tool-btn {
            height: 30px;
            background: #3d3d3d;
            border: 1px solid #111;
            box-shadow: inset 1px 1px 0 #555, inset -1px -1px 0 #222;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 10px;
            font-size: 8px;
            color: #fff;
            cursor: pointer;
        }

        .tool-btn:active {
            box-shadow: inset -1px -1px 0 #555, inset 1px 1px 0 #222;
            transform: translateY(1px);
        }

        .divider { width: 1px; height: 22px; background: #1a1a1a; margin: 0 4px; border-right: 1px solid #444; }

        /* Рабочая область */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #1a1a1a;
            padding-top: 0; 
        }

        /* Окно со стивом (Viewport) */
        .viewport-window {
            width: calc(100% - 40px); /* 20px отступы по бокам */
            height: 50%; 
            background: #1a1a1a;
            border: 2px solid #000;
            border-top: none; 
            box-shadow: inset 2px 2px 0 #222;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Пиксельная сетка */
        .viewport-window::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(45deg, #222 25%, transparent 25%), 
                linear-gradient(-45deg, #222 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #222 75%), 
                linear-gradient(-45deg, transparent 75%, #222 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            z-index: 0;
        }

        #skin_container { 
            width: 100%; 
            height: 100%; 
            position: relative; 
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-bar {
            height: 25px;
            background: #2b2b2b;
            border-top: 1px solid #111;
            display: flex;
            align-items: center;
            padding: 0 12px;
            font-size: 7px;
            color: #555;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <div class="tabs-row">
        <div class="tab"><span>Workspace</span></div>
        <div class="tab active">
            <img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/edit-icon-svg-download-png-14350273.png?f=webp&w=512" class="tab-icon">
            <span>skin.png</span>
        </div>
    </div>

    <div class="toolbar">
        <div class="toolbar-left">
            <div class="color-picker-block">
                <div class="selected-color-preview" id="colorPreview" onclick="openColorPicker()"></div>
                <div class="color-scheme-text" id="colorScheme">RGB: 255 255 255</div>
            </div>
            
            <div class="position-block">
                <span>POS: <b id="posText">0 0 0</b></span>
            </div>
        </div>

        <div class="toolbar-right">
            <div class="tool-btn" onclick="triggerImport()">
                <img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/download-icon-svg-download-png-14350272.png?f=webp&w=512" class="btn-icon">
                <span>IMPORT</span>
            </div>

            <div class="tool-btn">
                <img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/upload-icon-svg-download-png-14350373.png?f=webp&w=512" class="btn-icon">
                <span>EXPORT</span>
            </div>

            <div class="tool-btn">
                <img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/save-icon-svg-download-png-14350349.png?f=webp&w=512" class="btn-icon">
                <span>SAVE</span>
            </div>

            <div class="divider"></div>
            <div class="tool-btn" onclick="goBack()">BACK</div>
        </div>
    </div>

    <input type="file" id="skin_upload" accept="image/png" style="display: none;">
    
    <input type="color" id="colorInput" value="#ffffff" style="display: none;">

    <main>
        <div class="viewport-window">
            <div id="skin_container"></div>
        </div>
    </main>

    <div class="status-bar">
        <span>MODE: PREVIEW</span>
        <span>RES: 64x64</span>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Инициализация вьювера
        let skinViewer = new skinview3d.SkinViewer({
            width: 300,
            height: 300, 
            skin: "https://minotar.net/skin/MHF_Steve.png",
            alpha: true
        });
        
        document.getElementById("skin_container").appendChild(skinViewer.canvas);

        let control = skinview3d.createOrbitControls(skinViewer);
        control.enableRotate = true;
        control.enableZoom = true;
        control.enablePan = false;

        // Стив стал крупнее
        skinViewer.zoom = 0.7; 
        skinViewer.animation = new skinview3d.WalkingAnimation();
        skinViewer.animation.speed = 0.4;

        // Обновление координат при вращении/зуме
        function updatePositionDisplay() {
            const cam = skinViewer.camera.position;
            const x = Math.round(cam.x);
            const y = Math.round(cam.y);
            const z = Math.round(cam.z);
            document.getElementById('posText').innerText = `${x} ${y} ${z}`;
        }
        control.addEventListener('change', updatePositionDisplay);
        updatePositionDisplay(); // Первичная установка

        // Ресайз
        function resize() {
            const win = document.querySelector('.viewport-window');
            skinViewer.width = win.clientWidth;
            skinViewer.height = win.clientHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Логика выбора цвета
        const colorInput = document.getElementById('colorInput');
        const colorPreview = document.getElementById('colorPreview');
        const colorScheme = document.getElementById('colorScheme');

        function openColorPicker() {
            colorInput.click();
        }

        colorInput.addEventListener('input', function(e) {
            const color = e.target.value;
            colorPreview.style.background = color;
            
            // Преобразование HEX в RGB для отображения схемы
            const r = parseInt(color.substr(1,2), 16);
            const g = parseInt(color.substr(3,2), 16);
            const b = parseInt(color.substr(5,2), 16);
            colorScheme.innerText = `RGB: ${r} ${g} ${b}`;
            
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        });

        // Логика импорта
        function triggerImport() {
            document.getElementById('skin_upload').click();
        }

        document.getElementById('skin_upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => skinViewer.loadSkin(event.target.result);
                reader.readAsDataURL(file);
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            }
        });

        function goBack() {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            window.location.replace('index.html');
        }

        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
