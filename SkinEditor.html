<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APixel - Skin Editor</title>
    <link href="https://fonts.cdnfonts.com/css/common-pixel" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/skinview3d@3.0.0-alpha.1/bundles/skinview3d.bundle.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; image-rendering: pixelated; }
        body { background-color: #1a1a1a; color: #fff; font-family: 'Common Pixel', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Шапка в стиле главной */
        .header { 
            height: 60px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 20px; 
            background-color: #2b2b2b; 
            border-bottom: 2px solid #111;
            box-shadow: inset 0 -3px 0px rgba(0,0,0,0.2);
        }
        .header-title { display: flex; align-items: center; gap: 10px; font-size: 18px; text-shadow: 2px 2px 0px #000; }
        .back-btn { 
            padding: 5px 10px; 
            background: #3d3d3d; 
            border: 1px solid #111; 
            box-shadow: inset 2px 2px 0 #555, inset -2px -2px 0 #222;
            font-size: 10px;
            cursor: pointer;
        }
        .back-btn:active { transform: scale(0.95); box-shadow: inset -2px -2px 0 #555, inset 2px 2px 0 #222; }

        /* Центр со скином */
        main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            position: relative;
            background: radial-gradient(circle, #252525 0%, #1a1a1a 100%);
        }

        #skin_container {
            width: 100%;
            height: 70vh;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5));
        }

        /* Информационная панель снизу */
        .info-panel {
            width: 90%;
            max-width: 400px;
            background: #2b2b2b;
            border: 1px solid #111;
            box-shadow: inset 3px 3px 0 #3d3d3d;
            padding: 15px;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .status-row { display: flex; justify-content: space-between; font-size: 10px; color: #7a7a7a; }
        .status-row span b { color: #4CAF50; }

        /* Кастомный ползунок для вращения, если нужно */
        .controls-hint {
            position: absolute;
            bottom: 100px;
            font-size: 8px;
            color: #444;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-title">
            <span>APIXEL</span>
            <div style="width: 1px; height: 16px; background: #fff; opacity: 0.5;"></div>
            <span style="opacity: 0.7;">EDITOR</span>
        </div>
        <div class="back-btn" onclick="goBack()">BACK</div>
    </header>

    <main>
        <div id="skin_container"></div>
        <div class="controls-hint">Drag to rotate • Pinch to zoom</div>
        
        <div class="info-panel">
            <div class="status-row">
                <span>FILE: <b>SKIN.PNG</b></span>
                <span>MODEL: <b>STEVE (4px)</b></span>
            </div>
            <div style="height: 1px; background: #111; box-shadow: 0 1px 0 #3d3d3d;"></div>
            <div class="status-row" style="justify-content: center; gap: 20px;">
                <span>TOOLS LOCKED IN BETA</span>
            </div>
        </div>
    </main>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        // Инициализация 3D модели
        let skinViewer = new skinview3d.SkinViewer({
            width: window.innerWidth,
            height: window.innerHeight * 0.7,
            skin: "https://minotar.net/skin/MHF_Steve.png" // Стандартный скин для превью
        });
        
        document.getElementById("skin_container").appendChild(skinViewer.canvas);

        // Настройки камеры
        let control = skinview3d.createOrbitControls(skinViewer);
        control.enableRotate = true;
        control.enableZoom = true;
        control.enablePan = false;

        // Анимация (плавное покачивание)
        skinViewer.animation = new skinview3d.WalkingAnimation();
        skinViewer.animation.speed = 0.5;

        // Авто-ресайз при повороте экрана
        window.addEventListener('resize', () => {
            skinViewer.width = window.innerWidth;
            skinViewer.height = window.innerHeight * 0.7;
        });

        function goBack() {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            window.location.replace('index.html'); // Возвращаемся и "забываем" редактор
        }
    </script>
</body>
</html>
