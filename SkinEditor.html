<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>APixel - Skin Editor</title>
    <link href="https://fonts.cdnfonts.com/css/common-pixel" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/skinview3d@3.0.0-alpha.1/bundles/skinview3d.bundle.js"></script>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-user-select: none; 
            user-select: none; 
            -webkit-touch-callout: none;
            image-rendering: pixelated; 
        }

        /* Запрет скролла и фиксация экрана */
        html, body { 
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a; 
            color: #fff; 
            font-family: 'Common Pixel', sans-serif; 
        }

        body { 
            display: flex; 
            flex-direction: column; 
            /* Учет безопасной зоны Telegram сверху */
            padding-top: var(--tg-safe-area-inset-top, 0px);
        }

        /* Шапка: Кнопка Back | skin.png */
        .header { 
            height: 50px; 
            min-height: 50px;
            display: flex; 
            align-items: center; 
            padding: 0 15px; 
            background-color: #2b2b2b; 
            border-bottom: 2px solid #111;
            box-shadow: inset 0 -3px 0px rgba(0,0,0,0.2);
            gap: 12px;
            z-index: 10;
        }

        .back-btn { 
            height: 30px;
            padding: 0 12px; 
            background: #3d3d3d; 
            border: 1px solid #111; 
            box-shadow: inset 2px 2px 0 #555, inset -2px -2px 0 #1a1a1a;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .back-btn:active { transform: scale(0.95); box-shadow: inset -2px -2px 0 #555, inset 2px 2px 0 #1a1a1a; }

        .file-tab {
            height: 30px;
            background: #1a1a1a;
            border: 1px solid #111;
            padding: 0 15px;
            display: flex;
            align-items: center;
            font-size: 10px;
            color: #4CAF50;
            border-radius: 2px;
        }

        /* Контейнер для скина */
        main { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: radial-gradient(circle, #252525 0%, #1a1a1a 100%);
            position: relative;
        }

        #skin_container {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.6));
        }

        .controls-hint {
            position: absolute;
            bottom: 20px;
            font-size: 8px;
            color: #444;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="back-btn" onclick="goBack()">BACK</div>
        <div class="file-tab">skin.png</div>
    </header>

    <main>
        <div id="skin_container"></div>
        <div class="controls-hint">ROTATE AND ZOOM ENABLED</div>
    </main>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Инициализация 3D модели
        let skinViewer = new skinview3d.SkinViewer({
            width: window.innerWidth,
            height: window.innerHeight - 50, // Вычитаем высоту шапки
            skin: "https://minotar.net/skin/MHF_Steve.png"
        });
        
        document.getElementById("skin_container").appendChild(skinViewer.canvas);

        // Настройки камеры и модели
        let control = skinview3d.createOrbitControls(skinViewer);
        control.enableRotate = true;
        control.enableZoom = true;
        control.enablePan = false;

        // Делаем Стива чуть мельче (зум камеры)
        skinViewer.zoom = 0.65; 

        // Анимация покачивания
        skinViewer.animation = new skinview3d.WalkingAnimation();
        skinViewer.animation.speed = 0.4;

        // Ресайз
        window.addEventListener('resize', () => {
            skinViewer.width = window.innerWidth;
            skinViewer.height = window.innerHeight - 50;
        });

        function goBack() {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            window.location.replace('index.html');
        }

        // Блокировка контекстного меню и стандартных жестов браузера
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
