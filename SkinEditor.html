<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<link href="https://fonts.cdnfonts.com/css/common-pixel" rel="stylesheet"><script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/skinview3d@3.0.0-alpha.1/bundles/skinview3d.bundle.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;touch-action:none;image-rendering:pixelated}
html,body{position:fixed;width:100%;height:100%;overflow:hidden;background:#1a1a1a;color:#fff;font-family:'Common Pixel',sans-serif}
body{display:flex;flex-direction:column;padding-top:85px}
.tabs-row{display:flex;padding:0 10px;gap:2px;height:30px;align-items:flex-end}
.tab{height:26px;background:#252525;border:1px solid #000;border-bottom:none;padding:0 15px;display:flex;align-items:center;font-size:8px;color:#555;border-radius:4px 4px 0 0;cursor:pointer}
.tab.active{background:#333;color:#fff;height:30px;position:relative;z-index:11}
.tab.active::after{content:"";position:absolute;bottom:-2px;left:0;right:0;height:3px;background:#333;z-index:12}
.file-name-container{display:flex;align-items:center;gap:6px}
.pencil-icon{width:10px;height:10px;filter:brightness(0) invert(1);opacity:0.7}
.toolbar{height:42px;background:#333;border:1px solid #000;border-left:none;border-right:none;display:flex;align-items:center;padding:0 10px;position:relative;z-index:100;gap:8px}
.toolbar-left,.toolbar-right{display:flex;align-items:center;gap:6px}
.toolbar-right{flex:1;justify-content:flex-end}
.back-btn{position:relative;margin-left:15px;padding:0 12px;background:#3d3d3d;border:1px solid #111;border-left:none;height:30px;color:#fff;font-size:8px;display:flex;align-items:center;box-shadow:inset 0 1px 0 #555,inset 0 -1px 0 #222}
.back-btn::before{content:"";position:absolute;left:-15px;top:-1px;border-style:solid;border-width:15px 15px 15px 0;border-color:transparent #111 transparent transparent}
.back-btn::after{content:"";position:absolute;left:-13px;top:0;border-style:solid;border-width:14px 14px 14px 0;border-color:transparent #3d3d3d transparent transparent}
.btn-ui{height:30px;background:#3d3d3d;border:1px solid #111;box-shadow:inset 1px 1px 0 #555,inset -1px -1px 0 #222;display:flex;align-items:center;justify-content:center;padding:0 8px;font-size:7px;color:#fff;position:relative;cursor:pointer}
.btn-ui.active{background:#222;box-shadow:inset 1px 1px 2px #000;border-color:#555}
.info-ui{height:30px;background:#2b2b2b;border:1px solid #111;display:flex;align-items:center;padding:0 8px;font-size:7px;color:#888;letter-spacing:1px}
.chevron{font-size:10px;transform:rotate(90deg);margin-left:6px;color:#fff}
.dropdown{position:absolute;top:32px;left:-1px;width:100%;background:#3d3d3d;border:1px solid #111;display:none;flex-direction:column;z-index:200;box-shadow:inset 1px 1px 0 #555}
.dropdown div{padding:10px;border-bottom:1px solid #111;color:#fff;text-align:center;font-size:7px}
.btn-icon{width:14px;height:14px;filter:brightness(0) invert(1)}
main{flex:1;display:flex;flex-direction:column;align-items:center;padding-top:20px;position:relative}
.view-w{width:calc(100% - 40px);height:45%;background:#1a1a1a;border:2px solid #000;box-shadow:inset 2px 2px 0 #222;position:relative;overflow:hidden}
.bg-grid::before{content:"";position:absolute;top:0;left:0;width:100%;height:100%;background-image:linear-gradient(45deg,#222 25%,transparent 25%),linear-gradient(-45deg,#222 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#222 75%),linear-gradient(-45deg,transparent 75%,#222 75%);background-size:20px 20px}
#skin_container{width:100%;height:100%;position:absolute;display:flex;justify-content:center;align-items:center}
.edit-panel{width:100%;background:#333;border-top:1px solid #000;padding:10px;display:flex;flex-direction:column;gap:8px}
.tools-row{display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap}
.color-selector{display:flex;align-items:center;gap:8px;background:#2b2b2b;padding:4px 8px;border:1px solid #111;height:34px;cursor:pointer;flex:1;min-width:100px}
.color-preview{width:16px;height:16px;border:1px solid #000;background:#ffffff}
.rgb-text{font-size:7px;color:#fff;letter-spacing:1px}
.tool-group{display:flex;gap:4px;flex-wrap:wrap;justify-content:center}
.status-bar{height:25px;background:#2b2b2b;border-top:1px solid #111;display:flex;align-items:center;padding:0 12px;font-size:7px;color:#555;justify-content:space-between}
</style>
</head>
<body>
<div class="tabs-row"><div class="tab" onclick="location.href='Workspace.html'"><span>Workspace</span></div><div class="tab active" onclick="rF()"><div class="file-name-container"><span id="fN">skin.png</span><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/edit-icon-svg-download-png-14350273.png?f=webp&w=512" class="pencil-icon"></div></div></div>
<div class="toolbar"><div class="toolbar-left"><div class="back-btn" onclick="location.href='index.html'">BACK</div><div class="info-ui">POS:<b id="pT">0 0 0</b></div><div class="btn-ui" onclick="tDD(event)"><span id="mN">STEVE</span><span class="chevron">></span><div id="mDD" class="dropdown"><div onclick="sM('STEVE',0)">STEVE</div><div onclick="sM('ALEX',1)">ALEX</div></div></div><div class="btn-ui" onclick="tL()"><span style="color:#888">LAYERS:</span><span id="lSt" style="margin-left:4px">ON</span></div></div><div class="toolbar-right"><div class="btn-ui" onclick="svS(1)"><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/save-icon-svg-download-png-14350349.png?f=webp&w=512" class="btn-icon"></div><div class="btn-ui" onclick="iS()"><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/download-icon-svg-download-png-14350272.png?f=webp&w=512" class="btn-icon"></div><div class="btn-ui" onclick="eS()"><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/upload-icon-svg-download-png-14350373.png?f=webp&w=512" class="btn-icon"></div><input type="file" id="sI" accept="image/png" style="display:none" onchange="hI(event)"></div></div>
<main><div class="view-w bg-grid" id="vW"><div id="skin_container"></div></div></main>
<div class="edit-panel"><div class="tools-row"><div class="color-selector" onclick="pC()"><div id="cP" class="color-preview"></div><span id="rT" class="rgb-text">255 255 255</span><input type="color" id="cI" style="display:none" value="#ffffff" onchange="uC(this.value)"></div><div class="btn-ui" onclick="rTg()"><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/layers-icon-svg-download-png-14350299.png?f=webp&w=512" class="btn-icon" id="rIc"></div><div class="btn-ui" onclick="tBg()">BG</div></div><div class="tools-row"><div class="tool-group"><div class="btn-ui" onclick="un()">U</div><div class="btn-ui" onclick="re()">R</div><div class="btn-ui active" id="t_b" onclick="sT('b')"><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/paint-brush-icon-svg-download-png-14350322.png?f=webp&w=512" class="btn-icon"></div><div class="btn-ui" id="t_e" onclick="sT('e')"><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/eraser-icon-svg-download-png-14350275.png?f=webp&w=512" class="btn-icon"></div><div class="btn-ui" id="t_f" onclick="sT('f')"><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/paint-bucket-icon-svg-download-png-14350323.png?f=webp&w=512" class="btn-icon"></div><div class="btn-ui" id="t_p" onclick="sT('p')"><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/zoom-in-icon-svg-download-png-14350385.png?f=webp&w=512" class="btn-icon"></div><div class="btn-ui" id="t_d" onclick="sT('d')">D</div><div class="btn-ui" id="t_l" onclick="sT('l')">L</div></div></div></div>
<div class="status-bar"><span id="mSt">MODE: PAINT</span><span id="rI">RES: 64x64</span></div>
<script>
const tg=window.Telegram.WebApp;tg.expand();tg.disableVerticalSwipes();
let tl='b',col='#ffffff',isR=0,cv=document.createElement('canvas'),cx=cv.getContext('2d',{willReadFrequently:1}),sv=new skinview3d.SkinViewer({width:300,height:300,alpha:1}),cr=skinview3d.createOrbitControls(sv),ray=new THREE.Raycaster(),ms=new THREE.Vector2(),hs=[],hi=-1,lP=null,bgD=1;
cv.width=cv.height=64;document.getElementById("skin_container").appendChild(sv.canvas);cr.enabled=0;sv.zoom=3.5;sv.camera.position.set(0,10,30);
const im=new Image();im.crossOrigin="anonymous";im.src="https://minotar.net/skin/MHF_Steve.png";im.onload=()=>{cx.clearRect(0,0,64,64);cx.drawImage(im,0,0);sv.loadSkin(cv.toDataURL());sSt();};
function sSt(){hs=hs.slice(0,hi+1);hs.push(cx.getImageData(0,0,64,64));if(hs.length>30)hs.shift();else hi++;}
function un(){if(hi>0){hi--;cx.putImageData(hs[hi],0,0);upS();}}function re(){if(hi<hs.length-1){hi++;cx.putImageData(hs[hi],0,0);upS();}}
function hP(e){if(isR&&tl!=='p')return;const r=sv.canvas.getBoundingClientRect();ms.set(((e.clientX-r.left)/r.width)*2-1,-((e.clientY-r.top)/r.height)*2+1);ray.setFromCamera(ms,sv.camera);const i=ray.intersectObjects(sv.playerObject.children,1);if(i[0]&&i[0].uv){let u=Math.floor(i[0].uv.x*64),v=Math.floor((1-i[0].uv.y)*64);if(lP&&tl!=='f'&&tl!=='p')drL(lP.x,lP.y,u,v);else aT(u,v);lP={x:u,y:v};}}
sv.canvas.addEventListener('pointerdown',e=>{if(!isR){sv.canvas.setPointerCapture(e.pointerId);sSt();hP(e);sv.canvas.addEventListener('pointermove',hP);}});
window.addEventListener('pointerup',()=>{sv.canvas.removeEventListener('pointermove',hP);lP=null;});
function drL(x0,y0,x1,y1){let dx=Math.abs(x1-x0),dy=Math.abs(y1-y0),sx=x0<x1?1:-1,sy=y0<y1?1:-1,e=dx-dy;while(1){aT(x0,y0);if(x0===x1&&y0===y1)break;let e2=2*e;if(e2>-dy){e-=dy;x0+=sx;}if(e2<dx){e+=dx;y0+=sy;}}}
function aT(x,y){if(tl==='p'){let d=cx.getImageData(x,y,1,1).data;uC("#"+((1<<24)+(d[0]<<16)+(d[1]<<8)+d[2]).toString(16).slice(1));sT('b');return;}if(tl==='f'){fF(x,y,col);return;}let p=cx.getImageData(x,y,1,1).data;if(tl==='b'){cx.fillStyle=col;cx.fillRect(x,y,1,1);}else if(tl==='e')cx.clearRect(x,y,1,1);else if((tl==='l'||tl==='d')&&p[3]>0){let a=tl==='l'?15:-15;cx.fillStyle=`rgba(${p[0]+a},${p[1]+a},${p[2]+a},${p[3]/255})`;cx.clearRect(x,y,1,1);cx.fillRect(x,y,1,1);}upS();}
function fF(sx,sy,hx){let tc=cx.getImageData(sx,sy,1,1).data,fr=h2r(hx);if(cM(tc,[fr.r,fr.g,fr.b,255]))return;let id=cx.getImageData(0,0,64,64),px=id.data,st=[[sx,sy]];while(st.length){let[x,y]=st.pop(),o=(y*64+x)*4;if(cM([px[o],px[o+1],px[o+2],px[o+3]],tc)){px[o]=fr.r;px[o+1]=fr.g;px[o+2]=fr.b;px[o+3]=255;if(x>0)st.push([x-1,y]);if(x<63)st.push([x+1,y]);if(y>0)st.push([x,y-1]);if(y<63)st.push([x,y+1]);}}cx.putImageData(id,0,0);upS();}
function cM(a,b){return a[0]===b[0]&&a[1]===b[1]&&a[2]===b[2]&&a[3]===b[3];}function h2r(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}
function upS(){sv.loadSkin(cv.toDataURL());}
function rTg(){isR=!isR;cr.enabled=isR;tg.HapticFeedback?.impactOccurred('medium');mSt.innerText=isR?"MODE: VIEW":"MODE: PAINT";}
function tBg(){bgD=!bgD;document.getElementById('vW').classList.toggle('bg-grid',bgD);}
function pC(){cI.click();}function uC(h){col=h;cP.style.background=h;let r=h2r(h);rT.innerText=`${r.r} ${r.g} ${r.b}`;cI.value=h;}
function sT(t){tl=t;['b','e','f','p','d','l'].forEach(x=>{let el=document.getElementById(`t_${x}`);if(el)el.classList.remove('active');});document.getElementById(`t_${t}`).classList.add('active');if(t!=='p'){isR=0;cr.enabled=0;mSt.innerText="MODE: PAINT";}tg.HapticFeedback?.impactOccurred('light');}
function sM(m,sl){mN.innerText=m;let ti=new Image();ti.crossOrigin="anonymous";ti.src=sl?"https://minotar.net/skin/Alex":"https://minotar.net/skin/MHF_Steve.png";ti.onload=()=>{cx.clearRect(0,0,64,64);cx.drawImage(ti,0,0);sv.loadSkin(cv.toDataURL(),{model:sl?"slim":"default"});sSt();};tg.HapticFeedback?.impactOccurred('medium');}
function tL(){let o=lSt.innerText==="ON";lSt.innerText=o?"OFF":"ON";lSt.style.color=o?"#888":"#fff";['head','body','rightArm','leftArm','rightLeg','leftLeg'].forEach(p=>sv.playerObject.skin[p].outerLayer.visible=!o);tg.HapticFeedback?.impactOccurred('light');}
function rF(){let n=prompt("ENTER FILE NAME:",fN.innerText.replace('.png',''));if(n)fN.innerText=n.substring(0,20).toLowerCase()+".png";}
function eS(){let a=document.createElement('a');a.href=cv.toDataURL();a.download=fN.innerText;a.click();}
function iS(){sI.click();}function hI(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=(ev)=>{let i=new Image();i.onload=()=>{cx.clearRect(0,0,64,64);cx.drawImage(i,0,0);upS();sSt();};i.src=ev.target.result;};r.readAsDataURL(f);}
function tDD(e){e.stopPropagation();mDD.style.display=mDD.style.display==='flex'?'none':'flex';}window.onclick=()=>mDD.style.display='none';
cr.addEventListener('change',()=>{let c=sv.camera.position;pT.innerText=`${Math.round(c.x)} ${Math.round(c.y)} ${Math.round(c.z)}`;});
function rs(){let w=document.getElementById('vW');sv.width=w.clientWidth;sv.height=w.clientHeight;sv.camera.aspect=w.clientWidth/w.clientHeight;sv.camera.updateProjectionMatrix();}window.addEventListener('resize',rs);rs();
function svS(t){if(t)tg.HapticFeedback?.notificationOccurred('success');}
</script>
</body>
</html>
