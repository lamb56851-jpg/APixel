<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>APixel - Skin Editor</title>
    <link href="https://fonts.cdnfonts.com/css/common-pixel" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/skinview3d@3.0.0-alpha.1/bundles/skinview3d.bundle.js"></script>
    <style>
        * { 
            box-sizing: border-box; margin: 0; padding: 0; 
            -webkit-user-select: none; user-select: none; 
            -webkit-touch-callout: none; image-rendering: pixelated; 
        }

        html, body { 
            position: fixed; width: 100%; height: 100%; 
            overflow: hidden; background-color: #1a1a1a; 
            color: #fff; font-family: 'Common Pixel', sans-serif; 
        }

        body { 
            display: flex; flex-direction: column; 
            padding-top: var(--tg-safe-area-inset-top, 20px); 
        }

        /* Вкладки над шапкой (как в браузере) */
        .tabs-container {
            display: flex;
            padding: 0 10px;
            gap: 4px;
            align-items: flex-end;
            height: 30px;
        }

        .tab {
            height: 26px;
            background: #2b2b2b;
            border: 1px solid #111;
            border-bottom: none;
            padding: 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 9px;
            color: #888;
            border-radius: 4px 4px 0 0;
        }

        .tab.active {
            background: #333;
            color: #4CAF50;
            height: 30px;
            border-top: 2px solid #4CAF50;
        }

        .tab-icon {
            width: 12px;
            height: 12px;
            object-fit: contain;
        }

        /* Основная панель (Шапка) */
        .header { 
            height: 45px; 
            display: flex; 
            align-items: center; 
            padding: 0 15px; 
            background-color: #2b2b2b; 
            border-top: 1px solid #444;
            border-bottom: 2px solid #111;
            box-shadow: inset 0 -2px 0px rgba(0,0,0,0.2);
            gap: 10px;
            z-index: 10;
        }

        .back-btn { 
            height: 28px;
            padding: 0 10px; 
            background: #3d3d3d; 
            border: 1px solid #111; 
            box-shadow: inset 2px 2px 0 #555, inset -2px -2px 0 #1a1a1a;
            font-size: 9px;
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .back-btn:active { transform: scale(0.95); }

        .breadcrumb {
            font-size: 9px;
            color: #555;
            text-transform: uppercase;
        }

        /* Контейнер для 3D */
        main { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #1a1a1a;
            position: relative;
        }

        #skin_container {
            width: 100%;
            height: 100%;
            /* Смещение Стива чуть выше центра для визуального баланса */
            margin-top: -20px;
        }

        .controls-hint {
            position: absolute;
            bottom: 20px;
            font-size: 7px;
            color: #333;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="tabs-container">
        <div class="tab">
            <span>Workspace</span>
        </div>
        <div class="tab active">
            <img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/edit-icon-svg-download-png-14350273.png?f=webp&w=512" class="tab-icon">
            <span>skin.png</span>
        </div>
    </div>

    <header class="header">
        <div class="back-btn" onclick="goBack()">BACK</div>
        <div class="breadcrumb">Editor / Project / Skin</div>
    </header>

    <main>
        <div id="skin_container"></div>
        <div class="controls-hint">3D PREVIEW MODE</div>
    </main>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let skinViewer = new skinview3d.SkinViewer({
            width: window.innerWidth,
            height: window.innerHeight - 100, 
            skin: "https://minotar.net/skin/MHF_Steve.png"
        });
        
        document.getElementById("skin_container").appendChild(skinViewer.canvas);

        let control = skinview3d.createOrbitControls(skinViewer);
        control.enableRotate = true;
        control.enableZoom = true;
        control.enablePan = false;

        // Отдаляем камеру еще сильнее, чтобы Стив был в 2 раза меньше
        skinViewer.zoom = 0.45; 
        skinViewer.autoRotate = true;
        skinViewer.autoRotateSpeed = 0.5;

        skinViewer.animation = new skinview3d.WalkingAnimation();
        skinViewer.animation.speed = 0.3;

        window.addEventListener('resize', () => {
            skinViewer.width = window.innerWidth;
            skinViewer.height = window.innerHeight - 100;
        });

        function goBack() {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            window.location.replace('index.html');
        }

        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
