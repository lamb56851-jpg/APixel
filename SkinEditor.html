<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>APixel - Skin Editor</title>
    <link href="https://fonts.cdnfonts.com/css/common-pixel" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/skinview3d@3.0.0-alpha.1/bundles/skinview3d.bundle.js"></script>
    <style>
        * { 
            box-sizing: border-box; margin: 0; padding: 0; 
            -webkit-user-select: none; user-select: none; 
            -webkit-touch-callout: none; image-rendering: pixelated; 
        }

        html, body { 
            position: fixed; width: 100%; height: 100%; 
            overflow: hidden; background-color: #1a1a1a; 
            color: #fff; font-family: 'Common Pixel', sans-serif; 
        }

        body { 
            display: flex; flex-direction: column; 
            padding-top: var(--tg-safe-area-inset-top, 20px); 
        }

        /* Панель вкладок сверху */
        .tabs-row {
            display: flex;
            padding: 0 10px;
            gap: 2px;
            height: 28px;
            align-items: flex-end;
        }

        .tab {
            height: 24px;
            background: #2b2b2b;
            border: 1px solid #000;
            border-bottom: none;
            padding: 0 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 8px;
            color: #666;
            border-radius: 3px 3px 0 0;
        }

        .tab.active {
            background: #333;
            color: #fff;
            height: 28px;
            border-top: 2px solid #4CAF50;
            z-index: 2;
        }

        .tab-icon { width: 10px; height: 10px; opacity: 0.7; }

        /* Верхняя панель инструментов (Шапка) */
        .toolbar {
            height: 40px;
            background: #333;
            border-top: 1px solid #444;
            border-bottom: 2px solid #000;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 8px;
        }

        .tool-btn {
            height: 28px;
            background: #3d3d3d;
            border: 1px solid #111;
            box-shadow: inset 1px 1px 0 #555, inset -1px -1px 0 #222;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 8px;
            font-size: 8px;
            cursor: pointer;
        }

        .tool-btn:active { box-shadow: inset -1px -1px 0 #555, inset 1px 1px 0 #222; }

        .divider { width: 1px; height: 20px; background: #1a1a1a; margin: 0 2px; }

        /* Рабочая область */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #222;
            padding: 20px;
        }

        /* Окно предпросмотра скина (как на рефах) */
        .viewport-window {
            width: 100%;
            max-width: 340px;
            height: 50%; /* Скин занимает половину экрана */
            background: #1a1a1a;
            border: 2px solid #000;
            box-shadow: inset 2px 2px 0 #333;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Имитация сетки фона (прозрачность) */
        .viewport-window::before {
            content: "";
            position: absolute;
            width: 200%; height: 200%;
            background-image: linear-gradient(45deg, #1d1d1d 25%, transparent 25%), 
                              linear-gradient(-45deg, #1d1d1d 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #1d1d1d 75%), 
                              linear-gradient(-45deg, transparent 75%, #1d1d1d 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            opacity: 0.5;
            z-index: 0;
        }

        #skin_container {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .window-label {
            position: absolute;
            top: 5px;
            left: 8px;
            font-size: 7px;
            color: #444;
            z-index: 2;
        }

        /* Нижний статус-бар */
        .status-bar {
            height: 25px;
            background: #333;
            border-top: 1px solid #111;
            display: flex;
            align-items: center;
            padding: 0 10px;
            font-size: 7px;
            color: #777;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <div class="tabs-row">
        <div class="tab"><span>Workspace</span></div>
        <div class="tab active">
            <img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/edit-icon-svg-download-png-14350273.png?f=webp&w=512" class="tab-icon">
            <span>skin.png</span>
        </div>
    </div>

    <div class="toolbar">
        <div class="tool-btn" onclick="goBack()">BACK</div>
        <div class="divider"></div>
        <div class="tool-btn">FILE</div>
        <div class="tool-btn">EDIT</div>
        <div class="tool-btn">VIEW</div>
    </div>

    <main>
        <div class="viewport-window">
            <div class="window-label">3D_VIEWPORT_V1</div>
            <div id="skin_container"></div>
        </div>
    </main>

    <div class="status-bar">
        <span>64x64 PX | STEVE_MODEL</span>
        <span>FPS: 60</span>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Настройка вьювера
        let skinViewer = new skinview3d.SkinViewer({
            width: 340,
            height: window.innerHeight * 0.5, 
            skin: "https://minotar.net/skin/MHF_Steve.png",
            alpha: true // Чтобы видеть фон-сетку
        });
        
        document.getElementById("skin_container").appendChild(skinViewer.canvas);

        let control = skinview3d.createOrbitControls(skinViewer);
        control.enableRotate = true;
        control.enableZoom = true;
        control.enablePan = false;

        // Делаем Стива небольшим внутри его окна
        skinViewer.zoom = 0.55; 
        
        skinViewer.animation = new skinview3d.WalkingAnimation();
        skinViewer.animation.speed = 0.4;

        // Подгонка размера под окно
        function resize() {
            const win = document.querySelector('.viewport-window');
            skinViewer.width = win.clientWidth;
            skinViewer.height = win.clientHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function goBack() {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            window.location.replace('index.html');
        }

        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
