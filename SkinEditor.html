<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>APixel - Skin Editor</title>
    <link href="https://fonts.cdnfonts.com/css/common-pixel" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/skinview3d@3.0.0-alpha.1/bundles/skinview3d.bundle.js"></script>
    <style>
        * { 
            box-sizing: border-box; margin: 0; padding: 0; 
            -webkit-user-select: none; user-select: none; 
            -webkit-touch-callout: none; image-rendering: pixelated; 
        }

        html, body { 
            position: fixed; width: 100%; height: 100%; 
            overflow: hidden; background-color: #1a1a1a; 
            color: #fff; font-family: 'Common Pixel', sans-serif; 
        }

        body { 
            display: flex; flex-direction: column; 
            padding-top: 85px; 
        }

        /* Вкладки */
        .tabs-row {
            display: flex;
            padding: 0 10px;
            gap: 2px;
            height: 30px;
            align-items: flex-end;
        }

        .tab {
            height: 26px;
            background: #252525;
            border: 1px solid #000;
            border-bottom: none;
            padding: 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 8px;
            color: #555;
            border-radius: 4px 4px 0 0;
        }

        .tab.active {
            background: #333; 
            color: #fff;
            height: 30px;
            border: 1px solid #000;
            border-bottom: none;
            position: relative;
            z-index: 11;
        }

        .tab.active::after {
            content: "";
            position: absolute;
            bottom: -2px; left: 0; right: 0;
            height: 3px; background: #333;
            z-index: 12;
        }

        .tab-icon, .btn-icon { 
            width: 14px; height: 14px; 
            filter: brightness(0) invert(1); 
            object-fit: contain;
        }

        /* Тулбар */
        .toolbar {
            height: 42px;
            background: #333;
            border-top: 1px solid #000;
            border-bottom: 2px solid #000;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 6px;
            position: relative;
            z-index: 10;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 4px;
            flex: 1;
        }

        .color-picker-block {
            display: flex;
            align-items: center;
            height: 30px;
            background: #2b2b2b;
            border: 1px solid #111;
            padding-right: 6px;
        }

        .selected-color-preview {
            width: 30px;
            height: 28px;
            background: #fff;
            border-right: 1px solid #111;
        }

        .color-scheme-text, .position-block {
            font-size: 7px;
            color: #888;
            padding-left: 6px;
            letter-spacing: 1px;
        }

        .position-block {
            height: 30px;
            background: #2b2b2b;
            border: 1px solid #111;
            display: flex;
            align-items: center;
            padding: 0 8px;
        }

        /* Правая часть с иконками */
        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .icon-btn {
            width: 32px;
            height: 30px;
            background: #3d3d3d;
            border: 1px solid #111;
            box-shadow: inset 1px 1px 0 #555, inset -1px -1px 0 #222;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Кнопка Back со стрелкой */
        .back-btn {
            height: 30px;
            background: #3d3d3d;
            border: 1px solid #111;
            box-shadow: inset 1px 1px 0 #555, inset -1px -1px 0 #222;
            display: flex;
            align-items: center;
            padding: 0 10px;
            font-size: 8px;
            color: #fff;
            gap: 5px;
        }

        .back-btn::before {
            content: "";
            width: 0; height: 0;
            border-top: 4px solid transparent;
            border-bottom: 4px solid transparent;
            border-right: 5px solid #fff;
            margin-right: 2px;
        }

        .divider { width: 1px; height: 22px; background: #1a1a1a; margin: 0 2px; }

        /* Окно */
        main { flex: 1; display: flex; flex-direction: column; align-items: center; background: #1a1a1a; }

        .viewport-window {
            width: calc(100% - 40px);
            height: 55%; /* Увеличили высоту окна */
            background: #1a1a1a;
            border: 2px solid #000;
            border-top: none; 
            position: relative;
            overflow: hidden;
        }

        .viewport-window::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(45deg, #222 25%, transparent 25%), 
                              linear-gradient(-45deg, #222 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #222 75%), 
                              linear-gradient(-45deg, transparent 75%, #222 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        #skin_container { width: 100%; height: 100%; z-index: 1; }

        .status-bar { height: 25px; background: #2b2b2b; border-top: 1px solid #111; display: flex; align-items: center; padding: 0 12px; font-size: 7px; color: #555; justify-content: space-between; }
    </style>
</head>
<body>

    <div class="tabs-row">
        <div class="tab"><span>Workspace</span></div>
        <div class="tab active">
            <img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/edit-icon-svg-download-png-14350273.png?f=webp&w=512" class="tab-icon">
            <span>skin.png</span>
        </div>
    </div>

    <div class="toolbar">
        <div class="toolbar-left">
            <div class="color-picker-block">
                <div class="selected-color-preview" id="colorPreview" onclick="document.getElementById('colorInput').click()"></div>
                <div class="color-scheme-text" id="colorScheme">RGB: 255 255 255</div>
            </div>
            <div class="position-block">POS:<b id="posText" style="margin-left:5px">0 0 0</b></div>
        </div>

        <div class="toolbar-right">
            <div class="icon-btn" onclick="triggerImport()">
                <img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/download-icon-svg-download-png-14350272.png?f=webp&w=512" class="btn-icon">
            </div>
            <div class="icon-btn">
                <img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/upload-icon-svg-download-png-14350373.png?f=webp&w=512" class="btn-icon">
            </div>
            <div class="icon-btn">
                <img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/save-icon-svg-download-png-14350349.png?f=webp&w=512" class="btn-icon">
            </div>
            <div class="divider"></div>
            <div class="back-btn" onclick="goBack()">BACK</div>
        </div>
    </div>

    <input type="file" id="skin_upload" accept="image/png" style="display: none;">
    <input type="color" id="colorInput" value="#ffffff" style="display: none;">

    <main>
        <div class="viewport-window">
            <div id="skin_container"></div>
        </div>
    </main>

    <div class="status-bar">
        <span>VIEWPORT: ACTIVE</span>
        <span>RES: 64x64</span>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let skinViewer = new skinview3d.SkinViewer({
            width: 300,
            height: 300, 
            skin: "https://minotar.net/skin/MHF_Steve.png",
            alpha: true
        });
        
        document.getElementById("skin_container").appendChild(skinViewer.canvas);
        let control = skinview3d.createOrbitControls(skinViewer);

        // Стив теперь еще крупнее
        skinViewer.zoom = 0.9; 
        skinViewer.animation = new skinview3d.WalkingAnimation();

        function updatePos() {
            const c = skinViewer.camera.position;
            document.getElementById('posText').innerText = `${Math.round(c.x)} ${Math.round(c.y)} ${Math.round(c.z)}`;
        }
        control.addEventListener('change', updatePos);
        updatePos();

        window.addEventListener('resize', () => {
            const win = document.querySelector('.viewport-window');
            skinViewer.width = win.clientWidth;
            skinViewer.height = win.clientHeight;
        });
        
        // Масштабирование при загрузке
        setTimeout(() => window.dispatchEvent(new Event('resize')), 100);

        function triggerImport() { document.getElementById('skin_upload').click(); }
        document.getElementById('skin_upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => skinViewer.loadSkin(ev.target.result);
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('colorInput').addEventListener('input', (e) => {
            const hex = e.target.value;
            document.getElementById('colorPreview').style.backgroundColor = hex;
            const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
            document.getElementById('colorScheme').innerText = `RGB: ${r} ${g} ${b}`;
        });

        function goBack() { window.location.replace('index.html'); }
    </script>
</body>
</html>
