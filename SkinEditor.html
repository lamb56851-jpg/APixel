<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <link href="https://fonts.cdnfonts.com/css/common-pixel" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/skinview3d@3.0.0-alpha.1/bundles/skinview3d.bundle.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;touch-action:none;image-rendering:pixelated}
        html,body{position:fixed;width:100%;height:100%;overflow:hidden;background:#121212;color:#fff;font-family:'Common Pixel',sans-serif}
        
        /* Увеличенная верхняя часть */
        body{display:flex;flex-direction:column;padding-top:100px}
        
        .tabs-row{display:flex;padding:0 12px;gap:4px;height:35px;align-items:flex-end}
        .tab{height:30px;background:#252525;border:2px solid #000;border-bottom:none;padding:0 20px;display:flex;align-items:center;font-size:10px;color:#666;border-radius:6px 6px 0 0;cursor:pointer}
        .tab.active{background:#3a3a3a;color:#fff;height:35px;z-index:11;border-color:#000}

        .toolbar{height:50px;background:#3a3a3a;border-bottom:2px solid #000;display:flex;align-items:center;padding:0 12px;gap:10px;z-index:100}
        
        /* UI Элементы */
        .btn-ui{height:38px;min-width:38px;background:#4a4a4a;border:2px solid #000;box-shadow:inset 2px 2px 0 #666;display:flex;align-items:center;justify-content:center;padding:0 10px;font-size:9px;color:#fff;cursor:pointer;position:relative}
        .btn-ui:active{transform:translateY(1px);box-shadow:inset -2px -2px 0 #666}
        .btn-ui.active{background:#1a1a1a;box-shadow:inset 2px 2px 4px #000;border-color:#7a7a7a}
        
        .info-ui{height:38px;background:#222;border:2px solid #000;display:flex;align-items:center;padding:0 10px;font-size:9px;color:#aaa}

        /* Основной вид */
        main{flex:1;display:flex;justify-content:center;align-items:center;background:#1a1a1a;position:relative}
        .view-w{width:90%;height:90%;border:3px solid #000;background:#1e1e1e;position:relative;box-shadow:0 10px 20px rgba(0,0,0,0.5)}
        .view-w::before{content:"";position:absolute;width:100%;height:100%;background-image:linear-gradient(45deg,#252525 25%,transparent 25%),linear-gradient(-45deg,#252525 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#252525 75%),linear-gradient(-45deg,transparent 75%,#252525 75%);background-size:30px 30px}

        /* Продвинутая нижняя панель */
        .edit-panel{background:#2a2a2a;border-top:2px solid #000;padding:15px;display:flex;flex-direction:column;gap:15px}
        
        /* Первый ряд: Основные инструменты */
        .tools-row-main{display:flex;justify-content:space-between;align-items:center}
        
        .color-block{display:flex;align-items:center;gap:10px;background:#1a1a1a;padding:5px 12px;border:2px solid #000;border-radius:4px}
        .color-preview{width:24px;height:24px;border:2px solid #fff;background:#fff;box-shadow:0 0 5px rgba(0,0,0,0.5)}
        
        .tool-icons{display:flex;gap:6px}
        .tool-icons .btn-ui{width:44px;height:44px} /* Крупные кнопки инструментов */

        /* Второй ряд: Доп. функции */
        .tools-row-extra{display:flex;gap:8px;border-top:1px solid #3d3d3d;padding-top:10px}

        .btn-icon-big{width:24px;height:24px;filter:brightness(0) invert(1)}
        
        .status-bar{height:28px;background:#1a1a1a;border-top:2px solid #000;display:flex;align-items:center;padding:0 15px;font-size:9px;color:#444;justify-content:space-between}
    </style>
</head>
<body>
    <div class="tabs-row">
        <div class="tab" onclick="location.href='Workspace.html'">Workspace</div>
        <div class="tab active" id="fN">skin.png</div>
    </div>
    
    <div class="toolbar">
        <div class="btn-ui" style="background:#633" onclick="location.href='index.html'">EXIT</div>
        <div class="info-ui">XYZ: <b id="pT" style="color:#fff;margin-left:5px">0 0 0</b></div>
        <div style="flex:1"></div>
        <div class="btn-ui" onclick="impS()"><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/download-icon-svg-download-png-14350272.png?f=webp&w=512" class="btn-icon-big"></div>
        <div class="btn-ui" onclick="expS()"><img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/upload-icon-svg-download-png-14350373.png?f=webp&w=512" class="btn-icon-big"></div>
    </div>

    <main>
        <div class="view-w"><div id="skin_container" style="width:100%;height:100%"></div></div>
    </main>

    <div class="edit-panel">
        <div class="tools-row-main">
            <div class="color-block" onclick="document.getElementById('colorInput').click()">
                <div id="colorPreview" class="color-preview"></div>
                <div style="display:flex;flex-direction:column;gap:2px">
                    <span id="rgbText" style="font-size:8px;color:#fff">255 255 255</span>
                    <span style="font-size:6px;color:#555">TAP TO CHANGE</span>
                </div>
                <input type="color" id="colorInput" style="display:none" value="#ffffff" onchange="updateColor(this.value)">
            </div>

            <div class="tool-icons">
                <div class="btn-ui active" id="t_brush" onclick="setTool('brush')">
                    <img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/paint-brush-icon-svg-download-png-14350322.png?f=webp&w=512" class="btn-icon-big">
                </div>
                <div class="btn-ui" id="t_eraser" onclick="setTool('eraser')">
                    <img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/eraser-icon-svg-download-png-14350275.png?f=webp&w=512" class="btn-icon-big">
                </div>
                <div class="btn-ui" id="t_bucket" onclick="setTool('bucket')">
                    <img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/paint-bucket-icon-svg-download-png-14350323.png?f=webp&w=512" class="btn-icon-big">
                </div>
            </div>
        </div>

        <div class="tools-row-extra">
            <div class="btn-ui" onclick="tg.HapticFeedback?.impactOccurred('light')">
                <img src="https://cdn.iconscout.com/icon/premium/png-512-thumb/layers-icon-svg-download-png-14350299.png?f=webp&w=512" style="width:18px;filter:invert(1)">
                <span style="margin-left:5px">LAYERS</span>
            </div>
            <div class="btn-ui" onclick="toggleGrid()">
                <span id="gridStat" style="color:#888">GRID: OFF</span>
            </div>
            <div style="flex:1"></div>
            <div class="btn-ui" onclick="undo()">UNDO</div>
            <div class="btn-ui" onclick="redo()">REDO</div>
        </div>
    </div>

    <div class="status-bar">
        <span>PROJECT: MINECRAFT_SKIN</span>
        <span>FPS: 60</span>
        <span>VER: 1.0.4-BETA</span>
    </div>

    <input type="file" id="skinImport" accept="image/png" style="display:none" onchange="handleImport(event)">

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        
        let sv = new skinview3d.SkinViewer({
            width: 300,
            height: 300,
            skin: "https://minotar.net/skin/MHF_Steve.png",
            model: "default",
            alpha: true
        });
        document.getElementById("skin_container").appendChild(sv.canvas);
        let ctrl = skinview3d.createOrbitControls(sv);
        sv.zoom = 3.5; sv.animation = new skinview3d.WalkingAnimation();

        // Синхронизация размера
        function res(){
            const container = document.getElementById('skin_container');
            sv.width = container.clientWidth;
            sv.height = container.clientHeight;
        }
        window.addEventListener('resize', res); res();

        // Логика UI
        function updateColor(hex) {
            document.getElementById('colorPreview').style.background = hex;
            const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
            document.getElementById('rgbText').innerText = `${r} ${g} ${b}`;
            tg.HapticFeedback?.impactOccurred('light');
        }

        function setTool(tool) {
            ['brush', 'eraser', 'bucket'].forEach(t => document.getElementById(`t_${t}`).classList.remove('active'));
            document.getElementById(`t_${tool}`).classList.add('active');
            tg.HapticFeedback?.impactOccurred('medium');
        }

        function toggleGrid() {
            const s = document.getElementById('gridStat');
            const isOff = s.innerText.includes('OFF');
            s.innerText = isOff ? 'GRID: ON' : 'GRID: OFF';
            s.style.color = isOff ? '#fff' : '#888';
            tg.HapticFeedback?.impactOccurred('light');
        }

        function impS(){document.getElementById('skinImport').click()}
        function expS(){const a=document.createElement('a'); a.href=sv.canvas.toDataURL(); a.download=fN.innerText; a.click()}
        
        function handleImport(event){
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                sv.loadSkin(e.target.result);
                fN.innerText = file.name.toLowerCase();
                tg.HapticFeedback?.notificationOccurred('success');
            };
            reader.readAsDataURL(file);
        }

        function undo() { tg.HapticFeedback?.impactOccurred('light'); console.log('Undo'); }
        function redo() { tg.HapticFeedback?.impactOccurred('light'); console.log('Redo'); }
    </script>
</body>
</html>
